# Cloudflare Pages-конфиг (новый формат, читается, если репозиторий
# подключён к Pages через Git). Указывает, что собранный бандл лежит
# в web/dist — чтобы Pages не отдавала сырой корень репо.
#
# Если в dashboard Pages → Settings → Build уже задано Build command
# `cd web && npm install && npm run build` и Output `web/dist`, этот
# файл просто дублирует настройку и не мешает. Если build не настроен,
# то после следующего push Pages подцепит этот файл.

name = "ti-dtl"
compatibility_date = "2024-12-01"
pages_build_output_dir = "./web/dist"
