# Cloudflare Workers + D1 — конфигурация для бэкенда БондАналитика.
#
# Деплой:
#   npx wrangler login                              # один раз, OAuth в браузере
#   npx wrangler d1 create bondan-db                # создать БД, взять database_id
#   # вставить database_id в поле ниже
#   npx wrangler d1 execute bondan-db --file=backend/schema.sql
#   npx wrangler deploy                             # деплой Worker
#
# После deploy URL будет вида https://bondan-backend.<account>.workers.dev
# Cron-триггеры автоматически по расписанию ниже.

name = "bondan-backend"
main = "worker.js"
compatibility_date = "2026-04-20"

[[d1_databases]]
binding = "DB"
database_name = "coldline"
database_id   = "6a486b95-c5aa-4700-9adb-fc34512d9494"

# Ежедневный сбор в 10:30 по Москве (07:30 UTC).
# TQBR (акции) и FORTS (фьючерсы) дёргаем за один cron-вызов, обе
# коллекции пишутся в соответствующие таблицы.
#
# TRACK A — intraday-стакан FORTS: каждые 10 минут в рабочие часы MOEX
# (UTC 7..15 = MSK 10..18), по будням. Воркер в `scheduled` диспатчит
# по `event.cron`: дневные коллекторы только на «30 7 * * *»,
# trackACollectOrderbook — на оба паттерна.
[triggers]
crons = ["30 7 * * *", "*/10 7-15 * * 1-5"]

[vars]
MOEX_BASE = "https://iss.moex.com"
# ADMIN_TOKEN задаётся через `wrangler secret put ADMIN_TOKEN`.
