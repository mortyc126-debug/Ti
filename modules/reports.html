<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>База отчётности</title>
<style>
:root{
  --bg:#06080a;--s1:#0c1014;--s2:#111820;--s3:#162030;
  --border:#1e3048;--border2:#2a4060;
  --acc:#00d4ff;--acc2:#0099cc;--acc-dim:rgba(0,212,255,.08);
  --green:#22d3a0;--warn:#f5a623;--danger:#ff4d6d;--danger-dim:rgba(255,77,109,.08);
  --purple:#a78bfa;
  --text:#cce4f0;--text2:#7aa0b8;--text3:#3a6080;
  --mono:'JetBrains Mono','Fira Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column;font-size:.75rem}

/* layout */
#wrap{display:flex;flex:1;overflow:hidden}
#sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--s1)}
#main{flex:1;overflow-y:auto;padding:16px}

/* sidebar */
#sb-top{padding:8px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border)}
#sb-search{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.7rem;padding:5px 8px;outline:none}
#sb-search:focus{border-color:var(--acc)}
#sb-list{overflow-y:auto;flex:1}
.sb-row{padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.sb-row:hover{background:var(--s2)}
.sb-row.active{background:var(--acc-dim);border-left:2px solid var(--acc)}
.sb-name{color:var(--text);font-size:.7rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-meta{font-size:.58rem;color:var(--text3);margin-top:2px}
#sb-add{padding:8px;border-top:1px solid var(--border)}

/* toolbar */
#toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.page-title{font-size:1.1rem;color:var(--acc);margin-bottom:2px}
.page-sub{font-size:.58rem;color:var(--text2);margin-bottom:12px;letter-spacing:.08em;text-transform:uppercase}

/* кнопки */
.btn{background:none;border:1px solid var(--border2);color:var(--text2);font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-dim)}
.btn-p{background:var(--acc);color:var(--bg);border-color:var(--acc);font-weight:600}
.btn-p:hover{opacity:.85}
.btn-d{border-color:var(--danger);color:var(--danger)}
.btn-d:hover{background:var(--danger-dim)}

/* таблица периодов */
#periods-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:6px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
th:first-child{text-align:left}
td{padding:6px 10px;border-bottom:1px solid var(--border);text-align:right;font-size:.7rem;white-space:nowrap}
td:first-child{text-align:left;color:var(--text2)}
tr:hover td{background:var(--s2)}
tr.active-period td{background:var(--s3)}
.num{color:var(--text)}
.neg{color:var(--danger)}
.good{color:var(--green)}
.warn{color:var(--warn)}
.muted{color:var(--text3)}
.tag{font-size:.52rem;padding:1px 5px;border:1px solid;margin-left:4px}
.tag-msfo{border-color:var(--acc);color:var(--acc)}
.tag-rsbu{border-color:var(--text3);color:var(--text3)}
.tag-girbo{border-color:var(--purple);color:var(--purple)}

/* карточка эмитента */
#issuer-card{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:var(--s1);border:1px solid var(--border)}
.ic-field label{font-size:.52rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:2px}
.ic-field span{font-size:.72rem;color:var(--text)}

/* ГИРБО fetch */
#girbo-panel{background:var(--s1);border:1px solid var(--border);padding:12px;margin-bottom:14px}
#girbo-panel h3{font-size:.65rem;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
#girbo-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#girbo-inn{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.72rem;padding:5px 9px;outline:none;width:140px}
#girbo-inn:focus{border-color:var(--acc)}
#girbo-years{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.68rem;padding:5px 6px;outline:none;width:60px}
#girbo-status{font-size:.62rem;color:var(--text3);flex:1}
#girbo-status.ok{color:var(--green)}
#girbo-status.err{color:var(--danger)}
.ext-links{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ext-link{font-size:.6rem;color:var(--text3);text-decoration:none;border:1px solid var(--border);padding:2px 7px;transition:all .12s}
.ext-link:hover{color:var(--acc);border-color:var(--acc)}

/* модал */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--border2);padding:20px;width:min(540px,96vw);max-height:90vh;overflow-y:auto}
.modal h2{font-size:.8rem;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.field{margin-bottom:10px}
.field label{display:block;font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.74rem;padding:6px 9px;outline:none}
.field input:focus,.field select:focus{border-color:var(--acc)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
#empty-state{color:var(--text3);font-size:.68rem;padding:40px;text-align:center}
</style>
</head>
<body>

<div id="wrap">
  <!-- ── САЙДБАР ── -->
  <div id="sidebar">
    <div id="sb-top">
      <input id="sb-search" type="search" placeholder="🔎 эмитент / ИНН…" oninput="renderList()">
    </div>
    <div id="sb-list"></div>
    <div id="sb-add">
      <button class="btn btn-p" style="width:100%" onclick="openAddIssuer()">＋ Добавить эмитента</button>
    </div>
  </div>

  <!-- ── MAIN ── -->
  <div id="main">
    <div id="empty-state">← Выберите эмитента или добавьте нового</div>
    <div id="issuer-view" style="display:none">
      <div class="page-title" id="iv-name"></div>
      <div class="page-sub" id="iv-sub"></div>

      <!-- карточка -->
      <div id="issuer-card">
        <div class="ic-field"><label>ИНН</label><span id="ic-inn">—</span></div>
        <div class="ic-field"><label>ОГРН</label><span id="ic-ogrn">—</span></div>
        <div class="ic-field"><label>Отрасль</label><span id="ic-ind">—</span></div>
        <div class="ic-field"><label>Периодов</label><span id="ic-cnt">—</span></div>
        <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
          <button class="btn" onclick="openEditIssuer()">✎</button>
          <button class="btn btn-d" onclick="deleteIssuer()">🗑</button>
        </div>
      </div>

      <!-- ГИРБО -->
      <div id="girbo-panel">
        <h3>Загрузить из ГИР БО (bo.nalog.gov.ru)</h3>
        <div id="girbo-row">
          <input id="girbo-inn" type="text" placeholder="ИНН…" maxlength="12">
          <label style="font-size:.58rem;color:var(--text3)">лет:</label>
          <input id="girbo-years" type="number" value="5" min="1" max="10">
          <button class="btn btn-p" onclick="girboFetch()">↓ Загрузить</button>
          <span id="girbo-status">—</span>
        </div>
        <div class="ext-links">
          <a id="link-girbo"   class="ext-link" href="#" target="_blank">🔗 ГИР БО</a>
          <a id="link-zachest" class="ext-link" href="#" target="_blank">🔗 Честный бизнес</a>
          <a id="link-rusprofile" class="ext-link" href="#" target="_blank">🔗 rusprofile</a>
          <a id="link-egrul"   class="ext-link" href="#" target="_blank">🔗 ЕГРЮЛ</a>
        </div>
        <div id="girbo-proxy-note" style="margin-top:6px;font-size:.58rem;color:var(--text3)"></div>
      </div>

      <!-- тулбар периодов -->
      <div id="toolbar">
        <button class="btn btn-p" onclick="openAddPeriod()">＋ Период</button>
        <button class="btn" id="btn-edit-period"  style="display:none" onclick="openEditPeriod()">✎ Редактировать</button>
        <button class="btn btn-d" id="btn-del-period" style="display:none" onclick="deletePeriod()">🗑 Удалить период</button>
        <button class="btn" onclick="exportIssuer()">⬇ Экспорт JSON</button>
      </div>

      <!-- таблица -->
      <div id="periods-wrap">
        <div id="periods-empty" style="color:var(--text3);font-size:.65rem;padding:20px 0">Нет периодов — загрузи из ГИР БО или добавь вручную</div>
        <table id="periods-table" style="display:none">
          <thead id="periods-thead"></thead>
          <tbody id="periods-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ── МОДАЛ: добавить/редактировать эмитента ── -->
<div class="modal-bg" id="modal-issuer">
  <div class="modal">
    <h2 id="modal-issuer-title">Новый эмитент</h2>
    <div class="field"><label>Название *</label><input id="fi-name" type="text" placeholder="ООО Ромашка"></div>
    <div class="grid2">
      <div class="field"><label>ИНН</label><input id="fi-inn" type="text" maxlength="12" placeholder="7700000000"></div>
      <div class="field"><label>ОГРН</label><input id="fi-ogrn" type="text" placeholder="1027700000000"></div>
    </div>
    <div class="field">
      <label>Отрасль</label>
      <select id="fi-ind">
        <option value="">— не указана —</option>
        <option value="energy">Нефть и газ</option>
        <option value="metals">Металлургия</option>
        <option value="retail">Ритейл</option>
        <option value="telecom">Телеком</option>
        <option value="finance">Финансы / Банки</option>
        <option value="realty">Недвижимость</option>
        <option value="transport">Транспорт</option>
        <option value="agro">АПК</option>
        <option value="infra">Инфраструктура</option>
        <option value="it">IT / Технологии</option>
        <option value="other">Другое</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modal-issuer')">Отмена</button>
      <button class="btn btn-p" onclick="saveIssuer()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ── МОДАЛ: добавить/редактировать период ── -->
<div class="modal-bg" id="modal-period">
  <div class="modal">
    <h2 id="modal-period-title">Новый период</h2>
    <div class="grid3">
      <div class="field"><label>Год *</label><input id="fp-year" type="number" placeholder="2024"></div>
      <div class="field"><label>Период</label>
        <select id="fp-period">
          <option value="Год">Год</option>
          <option value="9М">9М</option>
          <option value="Полугодие">Полугодие</option>
          <option value="1 квартал">Q1</option>
          <option value="3 квартал">Q3</option>
        </select>
      </div>
      <div class="field"><label>Стандарт</label>
        <select id="fp-type">
          <option value="РСБУ">РСБУ</option>
          <option value="МСФО">МСФО</option>
          <option value="ГИРБО">ГИРБО</option>
        </select>
      </div>
    </div>
    <div style="font-size:.56rem;color:var(--text3);margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase">Отчёт о прибылях и убытках (млрд ₽)</div>
    <div class="grid3">
      <div class="field"><label>Выручка</label><input id="fp-rev"    type="number" step="any"></div>
      <div class="field"><label>EBITDA</label>  <input id="fp-ebitda" type="number" step="any"></div>
      <div class="field"><label>EBIT</label>    <input id="fp-ebit"   type="number" step="any"></div>
    </div>
    <div class="grid3">
      <div class="field"><label>Чист. прибыль</label><input id="fp-np"  type="number" step="any"></div>
      <div class="field"><label>Проц. расх.</label>  <input id="fp-int" type="number" step="any"></div>
      <div class="field"><label>Налог на прибыль</label><input id="fp-tax" type="number" step="any"></div>
    </div>
    <div style="font-size:.56rem;color:var(--text3);margin-bottom:8px;margin-top:4px;letter-spacing:.06em;text-transform:uppercase">Баланс (млрд ₽)</div>
    <div class="grid3">
      <div class="field"><label>Активы</label>   <input id="fp-assets" type="number" step="any"></div>
      <div class="field"><label>Об. активы</label><input id="fp-ca"     type="number" step="any"></div>
      <div class="field"><label>Кр. обяз.</label> <input id="fp-cl"     type="number" step="any"></div>
    </div>
    <div class="grid3">
      <div class="field"><label>Долг</label>        <input id="fp-debt" type="number" step="any"></div>
      <div class="field"><label>Ден. средства</label><input id="fp-cash" type="number" step="any"></div>
      <div class="field"><label>Капитал</label>     <input id="fp-eq"   type="number" step="any"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Нераспр. прибыль</label><input id="fp-ret" type="number" step="any"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modal-period')">Отмена</button>
      <button class="btn btn-p" onclick="savePeriod()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ── ХРАНИЛИЩЕ ──
// Работаем с тем же ключом ba_v2 что и основное приложение.
// Формат: {reportsDB: {issuerId: {name, inn, ogrn, ind, periods: {key: {...}}}}}
function loadDB(){
  try { return JSON.parse(localStorage.getItem('ba_v2') || '{}').reportsDB || {}; }
  catch(e){ return {}; }
}
function saveDB(db){
  try {
    const root = JSON.parse(localStorage.getItem('ba_v2') || '{}');
    root.reportsDB = db;
    localStorage.setItem('ba_v2', JSON.stringify(root));
  } catch(e){ alert('Ошибка сохранения: ' + e.message); }
}

// ── СОСТОЯНИЕ ──
let db = loadDB();
let selectedId  = null;
let selectedKey = null;  // активный период
let editingPeriodKey = null;  // если редактируем существующий

// ── СПИСОК ЭМИТЕНТОВ ──
function renderList(){
  const q   = document.getElementById('sb-search').value.toLowerCase();
  const el  = document.getElementById('sb-list');
  const ids = Object.keys(db).filter(id => {
    const iss = db[id];
    return !q || (iss.name||'').toLowerCase().includes(q) || (iss.inn||'').includes(q);
  }).sort((a,b) => (db[a].name||'').localeCompare(db[b].name||''));

  el.innerHTML = ids.map(id => {
    const iss = db[id];
    const cnt = Object.keys(iss.periods||{}).length;
    const lastYear = cnt ? Math.max(...Object.keys(iss.periods).map(k=>parseInt(k)||0).filter(Boolean)) : '—';
    return `<div class="sb-row${id===selectedId?' active':''}" onclick="selectIssuer('${id}')">
      <div class="sb-name">${esc(iss.name)}</div>
      <div class="sb-meta">${iss.inn||'нет ИНН'} · ${cnt} пер. · ${lastYear}</div>
    </div>`;
  }).join('');
}

// ── ВЫБОР ЭМИТЕНТА ──
function selectIssuer(id){
  selectedId  = id;
  selectedKey = null;
  renderList();
  renderIssuerView();
}

function renderIssuerView(){
  const iss = db[selectedId];
  if(!iss){ document.getElementById('issuer-view').style.display='none'; document.getElementById('empty-state').style.display=''; return; }
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('issuer-view').style.display = '';

  document.getElementById('iv-name').textContent = iss.name;
  document.getElementById('iv-sub').textContent  = [iss.ind, iss.inn].filter(Boolean).join(' · ');
  document.getElementById('ic-inn').textContent  = iss.inn  || '—';
  document.getElementById('ic-ogrn').textContent = iss.ogrn || '—';
  document.getElementById('ic-ind').textContent  = iss.ind  || '—';
  document.getElementById('ic-cnt').textContent  = Object.keys(iss.periods||{}).length;

  // prefill GIRBO inn
  if(iss.inn) document.getElementById('girbo-inn').value = iss.inn;
  updateExtLinks(iss.inn||'');
  updateProxyNote();

  renderPeriods();
  updatePeriodBtns();
}

function updateExtLinks(inn){
  const q = encodeURIComponent(inn||'');
  document.getElementById('link-girbo').href    = `https://bo.nalog.gov.ru/advanced-search/organizations/search?query=${q}`;
  document.getElementById('link-zachest').href  = `https://zachestnyibiznes.ru/company/ul/${inn||''}`;
  document.getElementById('link-rusprofile').href = `https://www.rusprofile.ru/search?query=${q}&type=ul`;
  document.getElementById('link-egrul').href    = `https://egrul.nalog.ru/index.html`;
}

function updateProxyNote(){
  const proxy = localStorage.getItem('bondan_girbo_proxy') || 'https://corsproxy.io/?';
  document.getElementById('girbo-proxy-note').textContent = 'Прокси: ' + proxy + ' · Изменить: localStorage.setItem("bondan_girbo_proxy", "URL")';
}

// ── ТАБЛИЦА ПЕРИОДОВ ──
const FIELDS = [
  {k:'rev',    l:'Выручка'},
  {k:'ebitda', l:'EBITDA'},
  {k:'ebit',   l:'EBIT'},
  {k:'np',     l:'Чист. приб.'},
  {k:'assets', l:'Активы'},
  {k:'eq',     l:'Капитал'},
  {k:'debt',   l:'Долг'},
  {k:'cash',   l:'Кэш'},
];
const RATIOS = [
  {k:'ndE',  l:'ND/EBITDA', fn: d => d.ebitda && d.debt!=null && d.cash!=null ? (d.debt-d.cash)/d.ebitda : null, good: v=>v<3, bad: v=>v>5, fmt: v=>v.toFixed(1)+'x'},
  {k:'icr',  l:'ICR',       fn: d => d.ebitda && d.int ? d.ebitda/d.int : null,               good: v=>v>3, bad: v=>v<1.5, fmt: v=>v.toFixed(1)+'x'},
  {k:'npm',  l:'ЧМ, %',     fn: d => d.np!=null && d.rev ? d.np/d.rev*100 : null,             good: v=>v>10, bad: v=>v<0, fmt: v=>v.toFixed(1)+'%'},
  {k:'cur',  l:'CR',        fn: d => d.ca && d.cl ? d.ca/d.cl : null,                         good: v=>v>1.2, bad: v=>v<0.8, fmt: v=>v.toFixed(2)+'x'},
];

function renderPeriods(){
  const iss  = db[selectedId];
  const periods = iss?.periods || {};
  const keys = Object.keys(periods).sort((a,b)=>{
    const ya = parseInt(a)||0, yb = parseInt(b)||0;
    return yb - ya;
  });

  const tbl  = document.getElementById('periods-table');
  const emp  = document.getElementById('periods-empty');
  if(!keys.length){ tbl.style.display='none'; emp.style.display=''; return; }
  tbl.style.display=''; emp.style.display='none';

  // thead
  const thead = document.getElementById('periods-thead');
  thead.innerHTML = '<tr><th style="text-align:left">Показатель</th>' +
    keys.map(k => {
      const p = periods[k];
      const tag = p.type==='МСФО' ? 'msfo' : p.type==='ГИРБО' ? 'girbo' : 'rsbu';
      return `<th onclick="selectPeriod('${k}')" style="cursor:pointer">${p.year||k} <span class="tag tag-${tag}">${p.type||''}</span></th>`;
    }).join('') + '</tr>';

  // rows
  const tbody = document.getElementById('periods-tbody');
  const allRows = [
    ...FIELDS.map(f => ({
      label: f.l,
      vals: keys.map(k => periods[k][f.k]),
      isRatio: false
    })),
    ...RATIOS.map(r => ({
      label: r.l,
      vals: keys.map(k => {
        const v = r.fn(periods[k]);
        return v != null ? v : null;
      }),
      isRatio: true, ratio: r
    }))
  ];

  tbody.innerHTML = allRows.map(row => {
    const cells = row.vals.map((v, i) => {
      const key = keys[i];
      const isActive = key === selectedKey;
      if(v == null) return `<td class="muted"${isActive?' style="background:var(--s3)"':''}>—</td>`;
      let cls = 'num';
      if(row.isRatio){
        if(row.ratio.good && row.ratio.good(v)) cls = 'good';
        else if(row.ratio.bad && row.ratio.bad(v)) cls = 'neg';
        else cls = 'warn';
        return `<td class="${cls}"${isActive?' style="background:var(--s3)"':''}>${row.ratio.fmt(v)}</td>`;
      }
      const neg = v < 0;
      return `<td class="${neg?'neg':'num'}"${isActive?' style="background:var(--s3)"':''}>${fmtBn(v)}</td>`;
    });
    return `<tr><td class="muted">${row.label}</td>${cells.join('')}</tr>`;
  }).join('');
}

function selectPeriod(key){
  selectedKey = selectedKey === key ? null : key;
  renderPeriods();
  updatePeriodBtns();
}

function updatePeriodBtns(){
  document.getElementById('btn-edit-period').style.display = selectedKey ? '' : 'none';
  document.getElementById('btn-del-period').style.display  = selectedKey ? '' : 'none';
}

// ── ФОРМАТТЕРЫ ──
function fmtBn(v){
  if(v == null || !isFinite(v)) return '—';
  if(Math.abs(v) >= 1000) return (v/1000).toFixed(1)+' трлн';
  if(Math.abs(v) >= 1)    return v.toFixed(1)+' млрд';
  return (v*1000).toFixed(0)+' млн';
}
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function uid(){ return 'iss_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,6); }

// ── ДОБАВИТЬ / РЕДАКТИРОВАТЬ ЭМИТЕНТА ──
let editingIssuerId = null;
function openAddIssuer(){
  editingIssuerId = null;
  document.getElementById('modal-issuer-title').textContent = 'Новый эмитент';
  ['fi-name','fi-inn','fi-ogrn'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fi-ind').value = '';
  document.getElementById('modal-issuer').classList.add('open');
}
function openEditIssuer(){
  if(!selectedId) return;
  const iss = db[selectedId];
  editingIssuerId = selectedId;
  document.getElementById('modal-issuer-title').textContent = 'Редактировать эмитента';
  document.getElementById('fi-name').value = iss.name||'';
  document.getElementById('fi-inn').value  = iss.inn||'';
  document.getElementById('fi-ogrn').value = iss.ogrn||'';
  document.getElementById('fi-ind').value  = iss.ind||'';
  document.getElementById('modal-issuer').classList.add('open');
}
function saveIssuer(){
  const name = document.getElementById('fi-name').value.trim();
  if(!name){ alert('Введите название'); return; }
  const id = editingIssuerId || uid();
  if(!db[id]) db[id] = {periods:{}};
  db[id].name = name;
  db[id].inn  = document.getElementById('fi-inn').value.trim();
  db[id].ogrn = document.getElementById('fi-ogrn').value.trim();
  db[id].ind  = document.getElementById('fi-ind').value;
  saveDB(db);
  closeModal('modal-issuer');
  selectedId = id;
  renderList();
  renderIssuerView();
}
function deleteIssuer(){
  if(!selectedId) return;
  if(!confirm('Удалить эмитента «' + (db[selectedId]?.name||'?') + '» со всеми периодами?')) return;
  delete db[selectedId];
  selectedId = null;
  saveDB(db);
  renderList();
  document.getElementById('issuer-view').style.display='none';
  document.getElementById('empty-state').style.display='';
}

// ── ДОБАВИТЬ / РЕДАКТИРОВАТЬ ПЕРИОД ──
function openAddPeriod(){
  editingPeriodKey = null;
  document.getElementById('modal-period-title').textContent = 'Новый период';
  const now = new Date().getFullYear();
  document.getElementById('fp-year').value   = now - 1;
  document.getElementById('fp-period').value = 'Год';
  document.getElementById('fp-type').value   = 'РСБУ';
  ['rev','ebitda','ebit','np','int','tax','assets','ca','cl','debt','cash','eq','ret']
    .forEach(f => document.getElementById('fp-'+f).value = '');
  document.getElementById('modal-period').classList.add('open');
}
function openEditPeriod(){
  if(!selectedKey || !selectedId) return;
  const p = db[selectedId].periods[selectedKey];
  if(!p) return;
  editingPeriodKey = selectedKey;
  document.getElementById('modal-period-title').textContent = 'Редактировать период';
  document.getElementById('fp-year').value   = p.year||'';
  document.getElementById('fp-period').value = p.period||'Год';
  document.getElementById('fp-type').value   = p.type||'РСБУ';
  ['rev','ebitda','ebit','np','int','tax','assets','ca','cl','debt','cash','eq','ret']
    .forEach(f => { const v=p[f]; document.getElementById('fp-'+f).value = v!=null?v:''; });
  document.getElementById('modal-period').classList.add('open');
}
function savePeriod(){
  const year   = parseInt(document.getElementById('fp-year').value)||0;
  if(!year){ alert('Введите год'); return; }
  const period = document.getElementById('fp-period').value;
  const type   = document.getElementById('fp-type').value;
  const key    = year + '_' + period + '_' + type;
  const data   = { year, period, type };
  ['rev','ebitda','ebit','np','int','tax','assets','ca','cl','debt','cash','eq','ret']
    .forEach(f => {
      const v = parseFloat(document.getElementById('fp-'+f).value);
      if(!isNaN(v)) data[f] = v;
    });
  if(editingPeriodKey && editingPeriodKey !== key) delete db[selectedId].periods[editingPeriodKey];
  if(!db[selectedId].periods) db[selectedId].periods = {};
  db[selectedId].periods[key] = data;
  saveDB(db);
  closeModal('modal-period');
  selectedKey = key;
  renderIssuerView();
}
function deletePeriod(){
  if(!selectedKey||!selectedId) return;
  if(!confirm('Удалить период «' + selectedKey + '»?')) return;
  delete db[selectedId].periods[selectedKey];
  selectedKey = null;
  saveDB(db);
  renderIssuerView();
}

// ── ЭКСПОРТ ──
function exportIssuer(){
  if(!selectedId) return;
  const data = { schema:'bondan/issuer/v1', exportedAt: new Date().toISOString(), issuer: db[selectedId] };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (db[selectedId].name||selectedId).replace(/[^а-яА-ЯёЁa-zA-Z0-9]/g,'_') + '.json';
  a.click();
}

// ── ГИРБО ──
function _girboProxyBase(){ return localStorage.getItem('bondan_girbo_proxy') || 'https://corsproxy.io/?'; }
function _girboUrl(path){
  const proxy = _girboProxyBase();
  const cb = (path.includes('?')?'&':'?') + '_t=' + Date.now();
  const target = 'https://bo.nalog.gov.ru' + path + cb;
  if(proxy.endsWith('=')) return proxy + encodeURIComponent(target);
  if(proxy.endsWith('?')) return proxy + target;
  return proxy + target;
}
async function _girboGet(path){
  const r = await fetch(_girboUrl(path), {headers:{Accept:'application/json'}});
  if(!r.ok) throw new Error('HTTP ' + r.status + ' ' + path);
  const ct = r.headers.get('content-type')||'';
  if(!/json/i.test(ct)){ const t=await r.text(); if(t.startsWith('<')) throw new Error('Прокси вернул HTML — капча или блокировка'); }
  return r.json();
}
const _FM = {
  rev:'2110', ebit:'2200', np:'2400', int:'2330',
  assets:'1600', ca:'1200', cl:'1500', cash:'1250', ret:'1370', eq:'1300',
  debt:['1410','1510']
};
function _extractFields(det, prefix){
  const out = {};
  for(const [fid, code] of Object.entries(_FM)){
    const codes = Array.isArray(code)?code:[code];
    let sum=0, any=false;
    for(const c of codes){ const v=det[prefix+c]; if(typeof v==='number'){sum+=v;any=true;} }
    if(any) out[fid] = (fid==='int'?Math.abs(sum):sum)/1e6;
  }
  return Object.keys(out).length ? out : null;
}

async function girboFetch(){
  const inn    = document.getElementById('girbo-inn').value.trim();
  const maxYrs = parseInt(document.getElementById('girbo-years').value)||5;
  const st     = document.getElementById('girbo-status');
  if(!inn){ alert('Введите ИНН'); return; }

  st.textContent='Поиск…'; st.className='';
  try {
    // 1. Найти организацию
    let orgs = [];
    const pick = r => Array.isArray(r)?r:(r?.content||r?.organizations||[]);
    for(const path of [
      '/advanced-search/organizations/search?inn='+inn,
      '/advanced-search/organizations/search?inn='+inn+'&page=0&size=20',
      '/nbo/organizations/?inn='+inn
    ]){
      try{ const r=await _girboGet(path); orgs=pick(r); if(orgs.length) break; }catch(_){}
    }
    if(!orgs.length){
      const r = await _girboGet('/advanced-search/organizations/search?query='+encodeURIComponent(inn)+'&page=0&size=20');
      orgs = pick(r);
    }
    if(!orgs.length) throw new Error('Организация не найдена в ГИР БО');

    const org   = orgs.find(o=>String(o.inn||o.organisationInn)===inn) || orgs[0];
    const orgId = org.id || org.organizationId;
    const orgName = org.name || org.shortName || org.fullName || '';
    const resolvedInn = String(org.inn||org.organisationInn||inn);

    // 2. Список отчётов
    st.textContent = 'Найдено: ' + orgName + ' · загружаю отчёты…';
    const bfoResp = await _girboGet('/nbo/organizations/'+orgId+'/bfo/');
    const bfoList = Array.isArray(bfoResp)?bfoResp:(bfoResp.content||bfoResp.bfo||[]);

    const isAnnual = b => {
      if(/^\d{4}$/.test(String(b.period||''))) return true;
      if(/year|год/i.test(b.period||b.bfoPeriod||'')) return true;
      if(b.periodType==='YEAR'||b.periodType===12) return true;
      if(b.year && !b.quarter) return true;
      return false;
    };
    const yearOf = b => parseInt(b.period||b.year||'0',10)||0;
    const annual = bfoList.filter(isAnnual).sort((a,b)=>yearOf(b)-yearOf(a)).slice(0, maxYrs);
    if(!annual.length) throw new Error('Нет годовых отчётов');

    // 3. Детали по каждому году
    if(!db[selectedId].periods) db[selectedId].periods = {};
    let added = 0;

    for(const b of annual){
      try {
        const corr = b?.typeCorrections?.[0]?.correction || b?.corrections?.[0]?.correction || b?.correction || null;
        const corrId = corr?.id || b.id || b.bfoId;
        let det;
        if(corr&&(corr.balance||corr.financialResult)&&(corr.balance?.current1600!=null||corr.financialResult?.current2110!=null)){
          det = Object.assign({}, corr.balance||{}, corr.financialResult||{});
        } else {
          const [bal, pnl] = await Promise.all([
            _girboGet('/nbo/details/balance?id='+corrId),
            _girboGet('/nbo/details/financial_result?id='+corrId)
          ]);
          det = Object.assign({}, bal, pnl);
        }
        const y = b.year || (b.period?parseInt(b.period,10):null) || det.year;
        if(!y) continue;

        const cur  = _extractFields(det, 'current');
        const prev = _extractFields(det, 'previous');
        const bp   = _extractFields(det, 'beforePrevious');

        const save = (yr, vals) => {
          if(!vals) return;
          const key = yr + '_Год_ГИРБО';
          if(!db[selectedId].periods[key]){
            db[selectedId].periods[key] = { year: yr, period: 'Год', type: 'ГИРБО', ...vals };
            added++;
          }
        };
        save(y, cur);
        save(y-1, prev);
        save(y-2, bp);
      } catch(e){ console.warn('[girbo] год', b.year, e.message); }
    }

    // Обновить ИНН и имя эмитента если не заполнены
    if(!db[selectedId].inn && resolvedInn) db[selectedId].inn = resolvedInn;
    if(!db[selectedId].girboName) db[selectedId].girboName = orgName;

    saveDB(db);
    st.textContent = '✓ Добавлено периодов: ' + added; st.className = 'ok';
    renderList(); renderIssuerView();

  } catch(e){
    st.textContent = '✗ ' + e.message; st.className = 'err';
  }
}

// ── МОДАЛЫ ──
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('open'); });
});

// ── SHELL BRIDGE ──
// Получаем ИНН из оболочки если там есть тикер (маппинга нет, но ИНН из ticker-поля тоже полезен)
window.addEventListener('message', e => {
  const d = e.data;
  if(!d || d.type !== 'SHELL_STATE') return;
  // shell может передать inn напрямую через ticker (пользователь вбил ИНН в поле тикера)
  if(d.ticker && /^\d{10,12}$/.test(d.ticker)){
    document.getElementById('girbo-inn').value = d.ticker;
  }
});

renderList();
