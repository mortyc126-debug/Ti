# ── Комиссия Т-Инвестиций ────────────────────────────────────────────────────
# TARIFF=TRADER  → акции 0,05%/сделка (round-trip 0,1%), фьючерсы 0,04%/сделка (round-trip 0,08%)
# TARIFF=PREMIUM → акции 0,04%/сделка (round-trip 0,08%), фьючерсы 0,025%/сделка (round-trip 0,05%)
# Используется в calc_quality()/backtest_quality() (commission_rt в oi_composite_strategy.py)
# и в ATR-фильтре шума — переключение тарифа сразу меняет оба расчёта.
[COMMISSION]
TARIFF=TRADER

[BLOG]
#0-off / 1-on
STATUS=1
TELEGRAM_BOT_TOKEN=8921775681:AAFpMH0gUV5x4mReaOny_m26i9tuSgadHsk
TELEGRAM_CHAT_ID=5561900123

[TRADING_ACCOUNT]
MIN_LIQUID_PORTFOLIO=9000
MIN_RUB_ON_ACCOUNT=5000

[TRADING_SETTINGS]
DELAY_START_AFTER_EXCHANGE_OPEN_SECONDS=10
STOP_TRADE_BEFORE_EXCHANGE_CLOSE_SECONDS=600
STOP_SIGNALS_BEFORE_EXCHANGE_CLOSE_MINUTES=60
# Доля среднего объёма последних 20 свечей по тикеру, которую можно
# выставить в одном ордере. Защита от непропорционально крупного ордера
# на неликвидном инструменте (проскальзывание/невозможность исполнения).
MAX_VOLUME_PARTICIPATION=0.1

# ── MOEX MEGA-ALERTS: автоторговля тикерами вне списка ниже ──────────────────
# AUTO_TRADE=1 → бот сам создаёт OICompositeStrategy для тикеров, которых
# MEGA-ALERTS отметил аномальными сегодня (если их нет в STRATEGY_* ниже).
# Перед запуском тянет историю свечей (HISTORY_DAYS дней) и прогоняет
# backtest_quality — реальные ордера разрешаются (SIGNAL_ONLY=0) только если
# виртуальные сделки на истории дали quality >= BACKTEST_QUALITY_MIN на
# >= BACKTEST_MIN_TRADES сделках, иначе тикер только шлёт сигналы в Telegram.
# Список пересобирается каждый торговый день, на диск не сохраняется (только
# результаты расчётов — в data/archive.json, см. archive.py).
[MEGA_ALERTS]
AUTO_TRADE=1
MAX_TICKERS=5
MAX_LOTS_PER_ORDER=1
SIGNAL_THRESHOLD=0.25
LONG_TAKE=1.015
LONG_STOP=0.985
SHORT_TAKE=0.985
SHORT_STOP=1.015
SIGNAL_ONLY=1
HISTORY_DAYS=5
BACKTEST_QUALITY_MIN=0.55
BACKTEST_MIN_TRADES=3

# ── Общая база расчётов по всему рынку (cf-collector, Cloudflare D1) ─────────
# Если задано — перед локальным бэктестом по тикеру из MEGA-ALERTS бот
# сначала спрашивает эту базу (свежий снэпшот за сегодня от
# collector_worker.py); если есть — использует готовое качество и не
# считает бэктест сам. Также сюда же пишутся снэпшоты из __archive_today.
# Пусто = не используется, бот считает всё сам локально (как раньше).
[DB_API]
URL=https://invest-bot-collector.marginacall.workers.dev
API_KEY=l3S6LoCy478KPY9eazD50JvVMgsIZf1d

