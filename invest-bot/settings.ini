# ── Brent и природный газ ────────────────────────────────────────────────────
# Раньше здесь были STRATEGY_BM/STRATEGY_NG — «скальпинг» на 1-мин свечах с
# узкими тейк/стопами (0.2-0.3%) и вручную вписанными FIGI контракта. Убраны:
#   1) их узкие барьеры всё равно не работали — MIN_STOP_DIST_PCT=0.6% в
#      oi_composite_strategy поднимал стоп до 0.6%, а ADAPTIVE_EXIT=1 (дефолт)
#      вообще игнорирует фиксированные уровни (Chandelier-трейлинг);
#   2) FIGI приходилось обновлять вручную перед каждой экспирацией — при
#      просрочке блок молча ломался (пустой FIGI → коллизия ключа → мусор в стрим);
#   3) дашборд не мог их бэктестить на 1-мин (форсил 5-мин).
# Теперь Brent/газ торгуются как обычные фьючерсы через [FUTURES_TRADING] ниже
# (добавлены в BASE_TICKERS) — контракт перевыбирается автоматически каждый день,
# сигнальные дефолты берутся из [FUTURES_DEFAULTS].

# ── Фьючерсы на базовые активы ───────────────────────────────────────────────
# ENABLED=1 → для каждого тикера из BASE_TICKERS бот находит ближайший по
# экспирации фьючерс на бирже (FORTS) и торгует ИМ вместо акции, используя
# настройки сигнала из соответствующей STRATEGY_<TICKER>_SETTINGS. Размер
# позиции считается от реального ГО (гарантийного обеспечения) контракта,
# а не от цены*лот — ГО берётся из API на каждый день заново (плечо ~5-10x).
# Контракт перевыбирается раз в день — если истёк, бот сам найдёт следующий.
[FUTURES_TRADING]
ENABLED=1
# Минимальный средний объём (лотов/свечу) за последние 20 баров.
# Фьючерсы ниже этого порога — слишком неликвидны для торговли сигналами
# (1-5 лотов на свечу = чистый шум, нет edge). 0 = фильтр отключён.
MIN_AVG_VOLUME=20
# «Топ-20 ликвидности» FORTS — курировано вручную (индекс + основная валюта +
# золото + самые торгуемые голубые фишки), не автосписок по факту оборота за
# сегодня. Урезано с исходных ~100 тикеров (там были тонкие АДР, экзотические
# кросс-курсы типа BYN/RUB и AED/RUB, крипто-индексы, аграрные товары —
# на FORTS это шум, не топ-20). Brent и природный газ включены сюда как обычные
# базовые активы (раньше торговались отдельным «скальпинг»-блоком STRATEGY_BM/NG,
# теперь убранным) — контракт по ним перевыбирается автоматически, как и по
# остальным. Значения тут — basic_asset из find_futures.py (не тикер контракта).
# Живая подстраховка на случай, если что-то из списка вдруг обмелеет —
# MIN_AVG_VOLUME=20 выше отфильтрует по факту объёма свечи, а не по этому списку.
BASE_TICKERS=IMOEX,RTSI,CNY/RUB,USD/RUB,Золото,Brent,Газ (США),
  SBER,GAZP,LKOH,GMKN,VTBR,ROSN,NVTK,TATN,MOEX,YDEX,PLZL,ALRS,MTSS,CHMF,SNGS

# ── Дефолты сигнала для фьючерсов без своей STRATEGY_*_SETTINGS ───────────────
# Индексные/валютные/товарные фьючерсы (IMOEX, CNY/RUB, Золото, Brent, газ...) не
# имеют акции-родителя в settings.ini, поэтому параметры сигнала им берутся
# отсюда. Раньше эти дефолты молча тянулись из [MEGA_ALERTS] — правка автоторговли
# аномалий незаметно меняла параметры 16 фьючерсов. Теперь разведено.
# Значения ниже = ровно то, что было в [MEGA_ALERTS] (поведение не изменилось).
# SIGNAL_ONLY=1 → эти фьючерсы только шлют сигналы; чтобы конкретный торговался
# боевым — заведи для него STRATEGY_<TICKER>/_SETTINGS с SIGNAL_ONLY=0
# (как у SBER/GAZP/LKOH/YDEX) либо поставь SIGNAL_ONLY=0 здесь для всех сразу.
[FUTURES_DEFAULTS]
