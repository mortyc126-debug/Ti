[INVEST_API]
TOKEN=
APP_NAME=invest-bot

[BLOG]
#0-off / 1-on
STATUS=1
TELEGRAM_BOT_TOKEN=
TELEGRAM_CHAT_ID=

[TRADING_ACCOUNT]
MIN_LIQUID_PORTFOLIO=9000
MIN_RUB_ON_ACCOUNT=5000

[TRADING_SETTINGS]
DELAY_START_AFTER_EXCHANGE_OPEN_SECONDS=10
STOP_TRADE_BEFORE_EXCHANGE_CLOSE_SECONDS=600
STOP_SIGNALS_BEFORE_EXCHANGE_CLOSE_MINUTES=60

# ── OICompositeStrategy — тариф «Трейдер» Т-Инвестиции ──────────────────────
#
# Комиссии тарифа «Трейдер» (round-trip = открытие + закрытие):
#   stocks:         0.05% × 2 = 0.10%
#   futures:        0.040% × 2 = 0.08%  (оборот до 5 млн ₽/день)
#   futures_extra:  0.080% × 2 = 0.16%  (фьючерсы из доп. списка)
#
# Если LONG_TAKE не задан — считается автоматически:
#   take = 1 + commission_round_trip × PROFIT_MARGIN
#   При PROFIT_MARGIN=1.5 и акциях: take = 1 + 0.10% × 1.5 = 1.00150
#   При PROFIT_MARGIN=3.0 и акциях: take = 1 + 0.10% × 3.0 = 1.00300
#
# SIGNAL_ONLY=1 → только Telegram, без реальных ордеров
# ────────────────────────────────────────────────────────────────────────────

[STRATEGY_SBER]
STRATEGY_NAME=OICompositeStrategy
TICKER=SBER
FIGI=BBG004730N88
MAX_LOTS_PER_ORDER=1
[STRATEGY_SBER_SETTINGS]
INSTRUMENT_TYPE=stocks
SIGNAL_THRESHOLD=0.25
PROFIT_MARGIN=3.0
# take = 1.003 (0.30%), stop = 0.999 (−0.10% = ровно комиссия round-trip)
# явные значения можно задать вручную, раскомментировав:
#LONG_TAKE=1.005
#LONG_STOP=0.997
#SHORT_TAKE=0.995
#SHORT_STOP=1.003
SIGNAL_ONLY=1

[STRATEGY_GAZP]
STRATEGY_NAME=OICompositeStrategy
TICKER=GAZP
FIGI=BBG004730RP0
MAX_LOTS_PER_ORDER=1
[STRATEGY_GAZP_SETTINGS]
INSTRUMENT_TYPE=stocks
SIGNAL_THRESHOLD=0.25
PROFIT_MARGIN=3.0
SIGNAL_ONLY=1

[STRATEGY_LKOH]
