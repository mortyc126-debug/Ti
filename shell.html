<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOEX Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0B0613;
  --panel:  #140A24;
  --card:   #1A1030;
  --acc:    #FF006E;
  --pos:    #52F2C9;
  --neg:    #FF4D7A;
  --text:   #F2F0FF;
  --text2:  #A79BC9;
  --muted:  #6F648F;
  --brd:    rgba(255,255,255,0.06);
  --mono:   'IBM Plex Mono', monospace;
  --sans:   'Inter', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text2);font-family:var(--sans)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#140A24}
::-webkit-scrollbar-thumb{background:#3d2d60;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#52F2C9}
*{scrollbar-width:thin;scrollbar-color:#3d2d60 #140A24}

/* ── TOPBAR ── */
#topbar{
  height:48px;display:flex;align-items:center;gap:2px;padding:0 12px;
  background:var(--panel);border-bottom:1px solid var(--brd);
  position:relative;z-index:200;flex-shrink:0;overflow-x:auto;
  scrollbar-width:none;
}
#topbar::-webkit-scrollbar{display:none}
#logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--acc);
  letter-spacing:.04em;margin-right:16px;flex-shrink:0;white-space:nowrap}
#logo span{color:var(--muted)}

.ntab{
  display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;
  font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;
  border:1px solid transparent;background:none;font-family:var(--sans);
  transition:all .12s;flex-shrink:0
}
.ntab:hover{color:var(--text2);background:rgba(255,255,255,.04)}
.ntab.active{color:var(--text);background:rgba(255,0,110,.1);border-color:rgba(255,0,110,.22)}
.ntab .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.ntab.active .dot{background:var(--acc);box-shadow:0 0 6px var(--acc)}
.ntab.loading .dot{background:var(--warn, #FFB86C);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#topbar-spacer{flex:1}

#topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.pill{display:flex;align-items:center;gap:5px;background:var(--card);
  border:1px solid var(--brd);border-radius:7px;padding:3px 9px}
.pill label{font-size:10px;color:var(--muted);font-family:var(--mono);
  text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.pill input{background:none;border:none;outline:none;color:var(--text);
  font-family:var(--mono);font-size:12px}
.pill input::placeholder{color:var(--muted)}
#ticker-input{width:72px;font-size:13px;font-weight:500;letter-spacing:.05em}
#token-input{width:80px}
#token-st{font-size:10px;font-family:var(--mono)}
#token-st.ok{color:var(--pos)}
#btn-go{background:rgba(255,0,110,.14);border:1px solid rgba(255,0,110,.25);
  color:var(--acc);border-radius:4px;font-size:10px;padding:2px 6px;
  cursor:pointer;font-family:var(--mono)}
#btn-go:hover{background:rgba(255,0,110,.24)}

/* ── FRAME AREA ── */
#frame-area{
  flex:1;position:relative;overflow:hidden
}
/* каждый модуль — iframe на всю площадь, скрытый по умолчанию */
.mod-frame{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;display:none
}
.mod-frame.active{display:block}

/* ── LOADING OVERLAY ── */
.mod-loading{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);flex-direction:column;gap:12px;pointer-events:none;
  font-size:13px;color:var(--muted);font-family:var(--mono)
}
.mod-loading.done{display:none}
.spinner{width:24px;height:24px;border:2px solid var(--brd);
  border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(50px);
  background:var(--card);border:1px solid var(--brd);border-radius:7px;
  padding:6px 14px;font-size:12px;font-family:var(--mono);color:var(--text2);
  transition:transform .22s cubic-bezier(.34,1.56,.64,1);z-index:9999;
  white-space:nowrap;pointer-events:none
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── FLOATING WINDOWS ── */
#win-layer{position:fixed;inset:0;top:48px;pointer-events:none;z-index:100}
.fwin{
  position:absolute;pointer-events:auto;display:flex;flex-direction:column;
  background:var(--card);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.6);
  overflow:hidden;min-width:240px;min-height:140px
}
.fwin.focused{border-color:rgba(255,0,110,.35)}
.fwin-bar{
  height:32px;display:flex;align-items:center;gap:6px;padding:0 10px;
  background:var(--panel);cursor:move;user-select:none;flex-shrink:0;
  border-bottom:1px solid var(--brd)
}
.fwin-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);
  box-shadow:0 0 5px var(--acc);flex-shrink:0}
.fwin-title{font-family:var(--mono);font-size:11px;color:var(--text);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fwin-btns{display:flex;align-items:center;gap:2px;flex-shrink:0}
.fwbtn{width:22px;height:22px;border:none;background:none;cursor:pointer;
  color:var(--muted);border-radius:4px;font-size:12px;display:flex;
  align-items:center;justify-content:center;transition:all .12s}
.fwbtn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.fwin-body{flex:1;position:relative;overflow:hidden}
.fwin-body iframe{width:100%;height:100%;border:none;display:block}
.fwin.micro .fwin-body{display:none}
.fwin.micro{height:32px!important;min-height:32px;resize:none}
.fwin-edge{position:absolute;z-index:10}
.fwin-edge.n{top:0;left:8px;right:8px;height:6px;cursor:n-resize}
.fwin-edge.s{bottom:0;left:8px;right:8px;height:6px;cursor:s-resize}
.fwin-edge.e{right:0;top:8px;bottom:8px;width:6px;cursor:e-resize}
.fwin-edge.w{left:0;top:8px;bottom:8px;width:6px;cursor:w-resize}
.fwin-edge.ne{top:0;right:0;width:10px;height:10px;cursor:ne-resize}
.fwin-edge.nw{top:0;left:0;width:10px;height:10px;cursor:nw-resize}
.fwin-edge.se{bottom:0;right:0;width:10px;height:10px;cursor:se-resize}
.fwin-edge.sw{bottom:0;left:0;width:10px;height:10px;cursor:sw-resize}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100%">

<div id="topbar">
  <div id="logo">MOEX<span>/</span>toolkit</div>
  <!-- вкладки генерируются JS -->
  <div id="topbar-spacer"></div>
  <div id="topbar-right">
    <div class="pill">
      <label>тикер</label>
      <input id="ticker-input" type="text" placeholder="SBER…"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')sendTicker()">
      <button id="btn-go" onclick="sendTicker()">→</button>
    </div>
    <div class="pill">
      <label>T-токен</label>
      <input id="token-input" type="password" placeholder="••••••••"
        oninput="onTokenInput(this.value)">
      <span id="token-st">—</span>
    </div>
  </div>
</div>

<div id="frame-area"></div>
<div id="win-layer"></div>
<div id="toast"></div>

<script>
// ══ КОНФИГ ══
// modules.json читается относительно shell.html.
// Если недоступен — работает через ручную загрузку (drag-and-drop будущая фича).
const KEY_TOKEN  = 't_api_token';
const KEY_TICKER = 'shared_ticker';

// ══ APP-мост (window.APP) ══
// Модуль в своём iframe может вызвать функцию другого модуля:
//   window.parent.APP.call('debt', 'getMetrics', { inn: '...' })
//   window.parent.APP.on('ticker', fn)          // подписка на смену тикера
//   window.parent.APP.emit('ticker', 'SBER')    // сгенерировать событие
window.APP = (function(){
  const _modules  = {};   // id → { iframe, ready, api:{fnName→fn} }
  const _subs     = {};   // event → [fn, ...]
  const _queue    = {};   // id → [{fn,args,resolve}, ...]  (до готовности)

  return {
    // Вызвать функцию другого модуля (возвращает Promise)
    call: function(moduleId, fnName, args) {
      return new Promise(function(resolve, reject) {
        var m = _modules[moduleId];
        if (!m) { reject('Module not found: ' + moduleId); return; }
        if (m.ready && m.api[fnName]) {
          try { resolve(m.api[fnName](args)); }
          catch(e) { reject(e); }
        } else {
          // Ставим в очередь до готовности модуля
          if (!_queue[moduleId]) _queue[moduleId] = [];
          _queue[moduleId].push({ fn: fnName, args: args, resolve: resolve, reject: reject });
        }
      });
    },

    // Подписаться на событие (ticker, token, custom)
    on: function(event, fn) {
      if (!_subs[event]) _subs[event] = [];
      _subs[event].push(fn);
    },

    // Отписаться
    off: function(event, fn) {
      if (!_subs[event]) return;
      _subs[event] = _subs[event].filter(function(f){ return f !== fn; });
    },

    // Сгенерировать событие (из шелла или модуля через shellNotify)
    emit: function(event, data) {
      (_subs[event] || []).forEach(function(fn){ try{ fn(data); }catch(e){} });
    },

    // Зарегистрировать модуль — вызывается из iframe модуля
    _register: function(id, api) {
      if (!_modules[id]) _modules[id] = { ready: false, api: {}, iframe: null };
      _modules[id].api   = api || {};
      _modules[id].ready = true;
      // Разгрести очередь
      var q = _queue[id] || [];
      delete _queue[id];
      q.forEach(function(item){
        try { item.resolve((_modules[id].api[item.fn] || function(){})(item.args)); }
        catch(e) { item.reject(e); }
      });
    },

    // Внутреннее: зарегистрировать iframe при создании
    _addFrame: function(id, iframeEl) {
      if (!_modules[id]) _modules[id] = { ready: false, api: {}, iframe: null };
      _modules[id].iframe = iframeEl;
    },

    modules: _modules,
  };
})();

// ══ СПИСОК МОДУЛЕЙ ══
// Редактировать здесь: добавить/убрать/переименовать модули.
// file — путь относительно shell.html (они должны лежать рядом).
var MODULES_CONFIG = [
  { id: 'reports',  file: 'reports-full (51).html', label: 'Отчётность',      icon: '📂' },
  { id: 'debt',     file: 'debt_v7.html',            label: 'Долговая нагрузка', icon: '📊' },
  { id: 'oisignal', file: 'oi-signal-v3.html',       label: 'OI Signal',        icon: '📡' },
  // { id: 'indlab', file: 'indlab_v10 (1).html',   label: 'ИндикаторЛаб',    icon: '🧪' },
  // { id: 'futures', file: 'v22Срочный_рынок (4).html', label: 'Срочный рынок', icon: '⚡' },
];

// ══ СОСТОЯНИЕ МОДУЛЕЙ ══
var activeId   = null;
var modConfigs = [];

// ══ ЗАПУСК ══
function loadModules() {
  var base = location.href.replace(/\/[^/]*$/, '/');
  modConfigs = MODULES_CONFIG;
  buildFrames(base);
  buildNav();
  if (modConfigs.length > 0) {
    var saved = localStorage.getItem('shell_active_module');
    var first = modConfigs.find(function(m){ return m.id === saved; }) || modConfigs[0];
    showModule(first.id);
  }
}

// ══ СОЗДАНИЕ IFRAME ДЛЯ КАЖДОГО МОДУЛЯ ══
function buildFrames(base) {
  var area = document.getElementById('frame-area');
  modConfigs.forEach(function(mod) {
    // Обёртка (для overlay загрузки)
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:absolute;inset:0;display:none';
    wrap.id = 'wrap-' + mod.id;

    // Спиннер пока грузится
    var loading = document.createElement('div');
    loading.className = 'mod-loading';
    loading.innerHTML = '<div class="spinner"></div><span>' + (mod.label || mod.id) + '…</span>';
    loading.id = 'loading-' + mod.id;

    var iframe = document.createElement('iframe');
    iframe.className = 'mod-frame';
    iframe.id = 'frame-' + mod.id;
    iframe.title = mod.label || mod.id;

    wrap.appendChild(loading);
    wrap.appendChild(iframe);
    area.appendChild(wrap);

    APP._addFrame(mod.id, iframe);

    // Загружаем src напрямую (тот же origin — rawgithack или localhost)
    iframe.onload = function(){
      document.getElementById('loading-' + mod.id).classList.add('done');
      // Пушим токен/тикер
      setTimeout(function(){ pushStateToFrame(iframe, true); }, 300);
      // Обновляем точку в навбаре
      var btn = document.getElementById('nav-' + mod.id);
      if (btn) btn.classList.remove('loading');
    };
    iframe.src = base + mod.file;
  });
}

// ══ НАВИГАЦИЯ ══
function buildNav() {
  var spacer = document.getElementById('topbar-spacer');
  modConfigs.forEach(function(mod){
    var btn = document.createElement('button');
    btn.className = 'ntab loading';
    btn.id = 'nav-' + mod.id;
    btn.innerHTML =
      '<span class="dot"></span>' +
      '<span>' + (mod.icon || '') + ' ' + (mod.label || mod.id) + '</span>' +
      '<button style="margin-left:4px;opacity:0;background:none;border:none;color:#6F648F;' +
      'cursor:pointer;font-size:11px;padding:0 2px;border-radius:3px" ' +
      'title="Открыть в окне" ' +
      'onmouseenter="this.style.opacity=1" onmouseleave="this.style.opacity=0" ' +
      'onclick="event.stopPropagation();openWindow(\'' + mod.id + '\')">⧉</button>';
    btn.onclick = function(){ showModule(mod.id); };
    spacer.parentNode.insertBefore(btn, spacer);
  });
}

function showModule(id) {
  activeId = id;
  localStorage.setItem('shell_active_module', id);

  // Показываем нужный wrap, скрываем остальные
  modConfigs.forEach(function(m){
    var wrap = document.getElementById('wrap-' + m.id);
    if (wrap) wrap.style.display = (m.id === id) ? 'block' : 'none';
    var btn  = document.getElementById('nav-' + m.id);
    if (btn) btn.classList.toggle('active', m.id === id);
  });
}

// ══ ОБЩЕЕ СОСТОЯНИЕ → iframe ══
function pushStateToFrame(frameEl, silent) {
  if (!frameEl || !frameEl.contentWindow) return;
  try {
    frameEl.contentWindow.postMessage({
      type:   'SHELL_STATE',
      token:  localStorage.getItem(KEY_TOKEN)  || '',
      ticker: silent ? '' : (localStorage.getItem(KEY_TICKER) || ''),
      silent: !!silent,
    }, '*');
  } catch(e) {}
}

function pushStateToAll(silent) {
  modConfigs.forEach(function(m){
    var f = document.getElementById('frame-' + m.id);
    if (f) pushStateToFrame(f, silent);
  });
  document.querySelectorAll('.fwin iframe').forEach(function(f){
    pushStateToFrame(f, silent);
  });
}

function sendTicker() {
  var v = document.getElementById('ticker-input').value.trim().toUpperCase();
  if (!v) return;
  localStorage.setItem(KEY_TICKER, v);
  pushStateToAll(false);
  APP.emit('ticker', v);
  toast('Тикер ' + v + ' → все модули');
}

function onTokenInput(v) {
  v = v.trim();
  var st = document.getElementById('token-st');
  if (v) {
    localStorage.setItem(KEY_TOKEN, v);
    localStorage.setItem('tinkoff_token', v);
    st.textContent = '✓'; st.className = 'ok';
    pushStateToAll(true);
  } else {
    localStorage.removeItem(KEY_TOKEN);
    localStorage.removeItem('tinkoff_token');
    st.textContent = '—'; st.className = '';
  }
}

// ══ СООБЩЕНИЯ ОТ МОДУЛЕЙ ══
window.addEventListener('message', function(e){
  var d = e.data;
  if (!d) return;

  // Модуль регистрирует своё API
  if (d.type === 'APP_REGISTER') {
    APP._register(d.id, d.api || {});
    return;
  }

  // Модуль хочет вызвать функцию другого модуля
  if (d.type === 'APP_CALL') {
    APP.call(d.target, d.fn, d.args).then(function(result){
      try { e.source.postMessage({ type: 'APP_CALL_RESULT', reqId: d.reqId, result: result }, '*'); } catch(_){}
    }).catch(function(err){
      try { e.source.postMessage({ type: 'APP_CALL_RESULT', reqId: d.reqId, error: String(err) }, '*'); } catch(_){}
    });
    return;
  }

  // Стандартные события
  if (d.type === 'MODULE_EVENT') {
    if (d.action === 'SET_TICKER' && d.ticker) {
      var t = String(d.ticker).trim().toUpperCase();
      if (!/^[A-Za-z][A-Za-z0-9\-]{0,11}$/.test(t)) return;
      document.getElementById('ticker-input').value = t;
      localStorage.setItem(KEY_TICKER, t);
      pushStateToAll(false);
      APP.emit('ticker', t);
    }
    if (d.action === 'SET_TOKEN' && d.token) {
      onTokenInput(d.token);
      document.getElementById('token-input').value = '';
    }
    if (d.action === 'APP_EMIT' && d.event) {
      APP.emit(d.event, d.data);
    }
  }
});

// ══ ПЛАВАЮЩИЕ ОКНА ══
var _zTop = 10;
var _wins = {};

function openWindow(modId, opts) {
  opts = opts || {};
  var mod = modConfigs.find(function(m){ return m.id === modId; });
  if (!mod) return;

  var id  = 'w' + Date.now();
  var w   = opts.w || 600;
  var h   = opts.h || 500;
  var x   = opts.x || 80 + Object.keys(_wins).length * 24;
  var y   = opts.y || 80 + Object.keys(_wins).length * 24;
  var base = location.href.replace(/\/[^/]*$/, '/');

  var el = document.createElement('div');
  el.className = 'fwin';
  el.id = id;
  el.style.cssText = 'left:'+x+'px;top:'+y+'px;width:'+w+'px;height:'+h+'px;z-index:'+( ++_zTop);

  el.innerHTML =
    '<div class="fwin-bar">' +
      '<div class="fwin-dot"></div>' +
      '<div class="fwin-title">' + (mod.icon||'') + ' ' + mod.label + '</div>' +
      '<div class="fwin-btns">' +
        '<button class="fwbtn" title="Свернуть" onclick="toggleMicro(\''+id+'\')">▭</button>' +
        '<button class="fwbtn" title="Закрыть"  onclick="closeWindow(\''+id+'\')">✕</button>' +
      '</div>' +
    '</div>' +
    '<div class="fwin-body"><iframe></iframe></div>' +
    '<div class="fwin-edge n"  data-dir="n"></div><div class="fwin-edge s" data-dir="s"></div>' +
    '<div class="fwin-edge e"  data-dir="e"></div><div class="fwin-edge w" data-dir="w"></div>' +
    '<div class="fwin-edge ne" data-dir="ne"></div><div class="fwin-edge nw" data-dir="nw"></div>' +
    '<div class="fwin-edge se" data-dir="se"></div><div class="fwin-edge sw" data-dir="sw"></div>';

  document.getElementById('win-layer').appendChild(el);

  var iframe = el.querySelector('iframe');
  iframe.onload = function(){ setTimeout(function(){ pushStateToFrame(iframe, true); }, 300); };
  iframe.src = base + mod.file;

  _wins[id] = { el: el, iframe: iframe, micro: false };
  el.addEventListener('mousedown', function(){ focusWindow(id); });
  makeDraggable(el, el.querySelector('.fwin-bar'));
  el.querySelectorAll('.fwin-edge').forEach(function(h){ makeResizable(el, h, h.dataset.dir); });
  focusWindow(id);
  toast((mod.icon||'') + ' ' + mod.label + ' → окно');
}

function focusWindow(id) {
  Object.values(_wins).forEach(function(w){ w.el.classList.remove('focused'); });
  if (_wins[id]) { _wins[id].el.style.zIndex = ++_zTop; _wins[id].el.classList.add('focused'); }
}

function closeWindow(id) {
  if (_wins[id]) { _wins[id].el.remove(); delete _wins[id]; }
}

function toggleMicro(id) {
  var w = _wins[id]; if (!w) return;
  w.micro = !w.micro;
  w.el.classList.toggle('micro', w.micro);
  w.el.querySelector('.fwbtn').textContent = w.micro ? '↕' : '▭';
}

function makeDraggable(el, handle) {
  var ox, oy;
  handle.addEventListener('mousedown', function(e){
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    ox = e.clientX - el.offsetLeft; oy = e.clientY - el.offsetTop;
    function onMove(e){ el.style.left = Math.max(0,e.clientX-ox)+'px'; el.style.top = Math.max(0,e.clientY-oy)+'px'; }
    function onUp(){ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function makeResizable(el, handle, dir) {
  handle.addEventListener('mousedown', function(e){
    e.preventDefault(); e.stopPropagation();
    var sx=e.clientX, sy=e.clientY, sw=el.offsetWidth, sh=el.offsetHeight, sl=el.offsetLeft, st=el.offsetTop;
    function onMove(e){
      var dx=e.clientX-sx, dy=e.clientY-sy, nw=sw, nh=sh, nl=sl, nt=st;
      if (/e/.test(dir)) nw = Math.max(240, sw+dx);
      if (/w/.test(dir)) { nw = Math.max(240, sw-dx); nl = sl+sw-nw; }
      if (/s/.test(dir)) nh = Math.max(140, sh+dy);
      if (/n/.test(dir)) { nh = Math.max(140, sh-dy); nt = st+sh-nh; }
      el.style.cssText = 'left:'+nl+'px;top:'+nt+'px;width:'+nw+'px;height:'+nh+'px;z-index:'+el.style.zIndex;
    }
    function onUp(){ document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ══ TOAST ══
var _tt;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

// ══ INIT ══
(function(){
  var tok    = localStorage.getItem(KEY_TOKEN);
  var ticker = localStorage.getItem(KEY_TICKER);
  if (tok) { document.getElementById('token-st').textContent = '✓'; document.getElementById('token-st').className = 'ok'; }
  if (ticker && /^[A-Za-z][A-Za-z0-9\-]{0,11}$/.test(ticker.trim())) {
    document.getElementById('ticker-input').value = ticker;
  }
  loadModules();
})();
</script>

     В данном шелле модули загружаются напрямую по URL, мост инжектируется
     через postMessage. Если модуль хочет зарегистрировать API — он делает:

       window.parent.postMessage({
         type: 'APP_REGISTER',
         id:   'debt',               // свой id из modules.json
         api:  { getMetrics: function(){ ... } }
       }, '*');

     Или короче (вставить в конец модуля):

       if (window.parent !== window) {
         window.parent.postMessage({ type:'APP_REGISTER', id:'debt', api:{ getMetrics } }, '*');
       }

     Вызвать функцию другого модуля (из любого модуля):

       window.parent.APP.call('reports', 'getIssuers').then(function(list){ ... });

     Подписаться на смену тикера:

       if (window.parent !== window) window.parent.APP.on('ticker', function(t){ ... });
