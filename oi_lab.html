<!DOCTYPE html>
<html lang="ru">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OI Lab — тестирование индикатора дисбаланса</title>
<style>

</style>
</head>
<body>
<h1>🔬 OI Lab — индикатор дисбаланса физ/юр (v3)</h1>

<div class="row">
  <label>Прокси-URL (invest-bot)
    <input id="proxy" type="text" placeholder="https://your-worker.workers.dev" value="">
  </label>
  <label>Тикер(ы) фьючерса
    <input id="tickers" type="text" placeholder="SBRF6 или SBRF6,SBRF9" value="">
  </label>
  <label>Режим
    <select id="mode">
      <option value="daily">Дневной (OI + дневные свечи)</option>
      <option value="hourly">Часовой (OI дня + 1h свечи)</option>
    </select>
  </label>
  <button onclick="labLoad()">Загрузить</button>
  <label>Бэкфилл (дней)
    <input id="bf-days" type="number" min="1" max="365" value="90" style="min-width:70px">
  </label>
  <button class="sec" onclick="labBackfill()">📥 Бэкфилл ОИ</button>
  <button class="sec" onclick="labFetchCandles('day')">📈 Свечи день</button>
  <button class="sec" onclick="labFetchCandles('hour')">📈 Свечи 1h</button>
</div>

<div id="status" class="status">—</div>

<!-- Конфиг -->
<details>
  <summary>⚙ Настройки индикатора</summary>
  <div class="cfg-grid" id="cfg-grid"></div>
</details>

<!-- Метрики последнего бара -->
<div class="panel-row" id="metrics-row"></div>

<!-- Интерпретация -->
<div id="interp" style="display:none"></div>

<!-- Графики -->
<div class="section">
  <div class="section-title">Цена + фаза накопления</div>
  <canvas id="c-price"></canvas>
</div>
<div class="section">
  <div class="section-title">WeightedImbalance / PhasePotential</div>
  <canvas id="c-oi"></canvas>
</div>
<div class="section">
  <div class="section-title">StressDistance / ReleaseFactor</div>
  <canvas id="c-phase"></canvas>
</div>

<!-- Таблица данных -->
<div class="section">
  <div class="section-title">Данные <button class="sec" style="font-size:10px;padding:2px 8px" onclick="labExportCsv()">CSV</button></div>
  <div style="max-height:260px;overflow-y:auto">
    <table id="tbl"><thead><tr></tr></thead><tbody></tbody></table>
  </div>
</div>

<script>
// ========== CONFIG ==========
const CFG_DEFAULTS = {
  decay: 0.90,
  decay_window: 10,
  z_window: 60,
  conviction_window: 60,
  conviction_alpha: 0.4,
  liquidity_window: 60,
  min_persons_floor: 5,
  velocity_window: 5,
  velocity_decel_gamma: 0.3,
  range_window: 15,
  range_percentile: 0.40,
  stress_scale: 0.01,
  stress_power: 2.0,
  phase_release_gamma: 0.6,
  include_yesterday_extreme: true,
  phase_confirm_bars: 3,
  use_adaptive_confirm: true,
  atr_window: 20,
  atr_percentile_window: 60,
  n_volatility_buckets: 5,
  adaptive_confirm_quantile: 0.5,
  min_phase_samples_per_bucket: 3,
  adaptive_confirm_floor: 3,
};

const CFG_LABELS = {
  decay: 'λ затухание',
  decay_window: 'Окно force',
  z_window: 'Окно z-score',
  conviction_window: 'Окно conviction',
  conviction_alpha: 'α conviction',
  liquidity_window: 'Окно liquidity',
  min_persons_floor: 'Мин.участников',
  velocity_window: 'Окно velocity',
  velocity_decel_gamma: 'γ decel',
  range_window: 'Окно range',
  range_percentile: 'Порог range',
  stress_scale: 'Масштаб стресса',
  stress_power: 'Степень release',
  phase_release_gamma: 'γ phase release',
  include_yesterday_extreme: 'Вчер.экстремум',
  phase_confirm_bars: 'Баров подтверж. (константа)',
  use_adaptive_confirm: 'Адаптивный confirm',
  atr_window: 'Окно ATR',
  atr_percentile_window: 'Окно персент.ATR',
  n_volatility_buckets: 'Корзин волат.',
  adaptive_confirm_quantile: 'Квантиль калибровки',
  min_phase_samples_per_bucket: 'Мин.фаз в корзине',
  adaptive_confirm_floor: 'Мин.confirm (пол)',
};

function buildCfgUI() {
  const g = document.getElementById('cfg-grid');
  g.innerHTML = '';
  for (const [k, v] of Object.entries(CFG_DEFAULTS)) {
    const d = document.createElement('div');
    d.className = 'cfg-item';
    const lbl = document.createElement('label');
    lbl.textContent = CFG_LABELS[k] || k;
    const inp = document.createElement('input');
    inp.id = 'cfg_' + k;
    inp.type = typeof v === 'boolean' ? 'checkbox' : 'number';
    if (typeof v === 'boolean') {
      inp.checked = v;
      inp.style.width = 'auto';
    } else {
      inp.value = v;
      inp.step = v < 1 && v > 0 ? '0.01' : '1';
    }
    d.appendChild(lbl);
    d.appendChild(inp);
    g.appendChild(d);
  }
}

function readCfg() {
  const cfg = {};
  for (const [k, v] of Object.entries(CFG_DEFAULTS)) {
    const el = document.getElementById('cfg_' + k);
    if (!el) { cfg[k] = v; continue; }
    if (typeof v === 'boolean') cfg[k] = el.checked;
    else cfg[k] = parseFloat(el.value) || v;
  }
  return cfg;
}

buildCfgUI();

// ========== DATA FETCH ==========
let _lastRows = null;
let _lastResult = null;

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + cls;
}

async function labBackfill() {
  const proxy = document.getElementById('proxy').value.trim().replace(/\/$/, '');
  const tickers = document.getElementById('tickers').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  const days = Math.min(parseInt(document.getElementById('bf-days').value) || 90, 365);
  if (!proxy) { setStatus('Укажи прокси-URL', 'err'); return; }
  if (!tickers.length) { setStatus('Укажи тикер', 'err'); return; }

  // Генерируем даты от сегодня назад
  const dates = [];
  const d = new Date();
  for (let i = 0; i < days; i++) {
    dates.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() - 1);
  }

  let saved = 0, empty = 0, failed = 0, done = 0;
  const PARALLEL = 5;
  setStatus(`Бэкфилл: 0/${dates.length} дат…`);

  async function fetchDate(date) {
    try {
      const r = await fetch(`${proxy}/db/oibackfill?tickers=${encodeURIComponent(tickers.join(','))}&date=${date}`);
      if (r.ok) { const j = await r.json(); return j; }
    } catch(_) {}
    return { saved: 0, empty: 0, failed: tickers.length };
  }

  for (let i = 0; i < dates.length; i += PARALLEL) {
    const chunk = dates.slice(i, i + PARALLEL);
    const results = await Promise.all(chunk.map(fetchDate));
    results.forEach(j => { saved += j.saved||0; empty += j.empty||0; failed += j.failed||0; });
    done += chunk.length;
    setStatus(`Бэкфилл: ${done}/${dates.length} дат, saved=${saved}, empty=${empty}, failed=${failed}`);
  }
  setStatus(`Бэкфилл завершён: saved=${saved}, empty=${empty}, failed=${failed}`, saved > 0 ? 'ok' : 'err');
}

async function labFetchCandles(tf) {
  tf = tf || 'day';
  const proxy = document.getElementById('proxy').value.trim().replace(/\/$/, '');
  const tickers = document.getElementById('tickers').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  if (!proxy) { setStatus('Укажи прокси-URL', 'err'); return; }
  if (!tickers.length) { setStatus('Укажи тикер', 'err'); return; }

  // Для часовых берём последние 90 дней (T-Invest ограничивает глубину)
  const from = tf === 'day' ? '2026-01-01' : (() => { const d=new Date(); d.setDate(d.getDate()-90); return d.toISOString().slice(0,10); })();
  const to   = new Date().toISOString().slice(0, 10);
  let totalSaved = 0;

  for (const t of tickers) {
    setStatus(`Загружаю ${tf}-свечи для ${t}…`);
    try {
      const r = await fetch(`${proxy}/db/candles/tinvest?ticker=${encodeURIComponent(t)}&tf=${tf}&from=${from}&to=${to}`);
      const j = await r.json();
      if (!r.ok) { setStatus(`Ошибка ${t}: ${j.error || r.status}`, 'err'); return; }
      totalSaved += j.saved || 0;
      setStatus(`${t} [${tf}]: сохранено ${j.saved} свечей (${j.from} — ${j.to})`, 'ok');
    } catch(e) {
      setStatus(`Ошибка ${t}: ${e.message}`, 'err'); return;
    }
  }
  setStatus(`Готово [${tf}]: ${totalSaved} баров. Нажми «Загрузить».`, 'ok');
}

async function labLoad() {
  const proxy = document.getElementById('proxy').value.trim().replace(/\/$/, '');
  const tickers = document.getElementById('tickers').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  const mode  = document.getElementById('mode').value;
  if (!proxy) { setStatus('Укажи прокси-URL', 'err'); return; }
  if (!tickers.length) { setStatus('Укажи тикер', 'err'); return; }
  setStatus('Загрузка…');

  try {
    const contractsMap = {};
    for (const t of tickers) {
      // Пробуем полный тикер, затем 2-буквенный sym (данные из all=1 бэкфилла хранятся как SS, BR...)
      const sym = t.match(/^([A-Za-z]{2})/)?.[1] || t;
      let rawArr = [];
      for (const key of [t, ...(sym !== t ? [sym] : [])]) {
        const r = await fetch(`${proxy}/db/oidaily?ticker=${encodeURIComponent(key)}`);
        if (!r.ok) continue;
        const json = await r.json();
        rawArr = Array.isArray(json) ? json : (json.rows || json.data || []);
        if (rawArr.length) break;
      }
      let rows = rawArr.map(normalizeRow).filter(r=>r.date);
      if (!rows.length) throw new Error(`Нет данных для ${t} (проверь бэкфилл)`);

      // Мёрджим дневные свечи (O/H/L/C) по дате
      try {
        const cr = await fetch(`${proxy}/db/candles?ticker=${encodeURIComponent(sym)}&tf=day&from=0`);
        if (cr.ok) {
          const cdata = await cr.json();
          const carr = Array.isArray(cdata) ? cdata : (cdata.rows || []);
          const candleMap = {};
          for (const c of carr) {
            if (c.time) candleMap[new Date(c.time * 1000).toISOString().slice(0, 10)] = c;
          }
          rows = rows.map(r => {
            const c = candleMap[r.date];
            if (!c) return r;
            return { ...r, close: c.cl || r.close, open: c.o, high: c.h, low: c.l };
          });
        }
      } catch(_) {}

      // Если режим «Часовой» — подменяем строки на часовые свечи с транслированным OI
      if (mode === 'hourly') {
        try {
          const hr = await fetch(`${proxy}/db/candles?ticker=${encodeURIComponent(sym)}&tf=hour&from=0`);
          if (hr.ok) {
            const hdata = await hr.json();
            const hcarr = (Array.isArray(hdata) ? hdata : (hdata.rows || [])).filter(c=>c.cl>0);
            if (hcarr.length) {
              // Строим map: YYYY-MM-DD → дневная строка OI
              const oiByDate = {};
              for (const r of rows) oiByDate[r.date] = r;
              rows = hcarr.map(c => {
                const dt = new Date(c.time * 1000);
                const date = dt.toISOString().slice(0, 10);
                const oi = oiByDate[date] || {};
                return {
                  date: dt.toISOString().slice(0, 16).replace('T', ' '), // "2026-06-25 13:00"
                  _date: date,
                  close: c.cl, open: c.o, high: c.h, low: c.l,
                  phys_long_contracts:  oi.phys_long_contracts  || 0,
                  phys_short_contracts: oi.phys_short_contracts || 0,
                  phys_long_persons:    oi.phys_long_persons    || 0,
                  phys_short_persons:   oi.phys_short_persons   || 0,
                  legal_long_contracts:  oi.legal_long_contracts  || 0,
                  legal_short_contracts: oi.legal_short_contracts || 0,
                  legal_long_persons:    oi.legal_long_persons    || 0,
                  legal_short_persons:   oi.legal_short_persons   || 0,
                  ref_switch: false,
                };
              });
            }
          }
        } catch(_) {}
      }

      contractsMap[t] = rows;
    }

    const cfg = readCfg();
    let rows, refSwitchDates;
    if (Object.keys(contractsMap).length === 1) {
      rows = Object.values(contractsMap)[0];
      refSwitchDates = [];
    } else {
      ({ rows, refSwitchDates } = aggregateContracts(contractsMap));
    }

    const result = computeIndicator(rows, cfg, refSwitchDates);
    _lastRows = rows;
    _lastResult = result;
    renderAll(result);
    const hasHL = rows.some(r => r.high > 0 && r.low > 0);
    const accumCount = result.filter(r => r.accum_flag).length;
    setStatus(`Загружено ${rows.length} баров (${tickers.join(', ')}) | H/L свечи: ${hasHL ? 'есть' : 'НЕТ — нажми «Свечи день»'} | Накопление: ${accumCount} баров`, 'ok');
  } catch(e) {
    setStatus('Ошибка: ' + e.message, 'err');
    console.error(e);
  }
}

function normalizeRow(r) {
  // oi_daily колонки: ticker, tradedate, price, yur_long, yur_short, fiz_long, fiz_short,
  //                   yur_long_num, yur_short_num, fiz_long_num, fiz_short_num
  return {
    date: r.tradedate || r.date || r.timestamp,
    close: parseFloat(r.price || r.close_price || r.close || 0),
    phys_long_contracts: parseFloat(r.fiz_long || 0),
    phys_short_contracts: parseFloat(r.fiz_short || 0),
    phys_long_persons: parseFloat(r.fiz_long_num || r.phys_long_persons || 0),
    phys_short_persons: parseFloat(r.fiz_short_num || r.phys_short_persons || 0),
    legal_long_contracts: parseFloat(r.yur_long || 0),
    legal_short_contracts: parseFloat(r.yur_short || 0),
    legal_long_persons: parseFloat(r.yur_long_num || r.legal_long_persons || 0),
    legal_short_persons: parseFloat(r.yur_short_num || r.legal_short_persons || 0),
    ref_switch: r.ref_switch || false,
  };
}

// ========== AGGREGATE CONTRACTS ==========
function aggregateContracts(contractsMap) {
  // Собираем все даты
  const allDates = [...new Set(Object.values(contractsMap).flatMap(r=>r.map(x=>x.date)))].sort();

  const POS_COLS = ['phys_long_contracts','phys_short_contracts','phys_long_persons','phys_short_persons',
    'legal_long_contracts','legal_short_contracts','legal_long_persons','legal_short_persons'];

  // indexed: ticker -> date -> row
  const indexed = {};
  for (const [t, rows] of Object.entries(contractsMap)) {
    indexed[t] = {};
    for (const r of rows) indexed[t][r.date] = r;
  }

  const rows = [];
  const refSwitchDates = [];
  let prevRef = null;

  for (const date of allDates) {
    const agg = { date, close: 0, ref_switch: false };
    for (const c of POS_COLS) agg[c] = 0;

    let bestOi = -1, bestTicker = null;
    for (const [t, byDate] of Object.entries(indexed)) {
      const r = byDate[date];
      if (!r) continue;
      for (const c of POS_COLS) agg[c] += (r[c] || 0);
      const oi = (r.phys_long_contracts||0) + (r.legal_long_contracts||0);
      if (oi > bestOi) { bestOi = oi; bestTicker = t; }
    }

    if (bestTicker) {
      agg.close = indexed[bestTicker][date]?.close || 0;
      if (prevRef && bestTicker !== prevRef) {
        agg.ref_switch = true;
        refSwitchDates.push(date);
      }
      prevRef = bestTicker;
    }
    rows.push(agg);
  }
  return { rows, refSwitchDates };
}

// ========== INDICATOR COMPUTATION ==========

function _rollingMean(arr, w) {
  const out = new Array(arr.length).fill(NaN);
  let sum = 0, cnt = 0;
  for (let i = 0; i < arr.length; i++) {
    const v = arr[i];
    if (isFinite(v)) { sum += v; cnt++; }
    if (i >= w) {
      const old = arr[i-w];
      if (isFinite(old)) { sum -= old; cnt--; }
    }
    if (cnt >= Math.max(1, Math.floor(w/2))) out[i] = sum/cnt;
  }
  return out;
}

function _rollingStd(arr, w) {
  const out = new Array(arr.length).fill(NaN);
  for (let i = w-1; i < arr.length; i++) {
    let s=0, s2=0, n=0;
    for (let j=i-w+1; j<=i; j++) {
      const v = arr[j];
      if (isFinite(v)) { s+=v; s2+=v*v; n++; }
    }
    if (n >= Math.max(1, Math.floor(w/2))) {
      const mean = s/n;
      out[i] = Math.sqrt(Math.max(0, s2/n - mean*mean));
    }
  }
  return out;
}

function _rollingQuantile(arr, w, q) {
  const out = new Array(arr.length).fill(NaN);
  for (let i = w-1; i < arr.length; i++) {
    const win = arr.slice(i-w+1, i+1).filter(isFinite).sort((a,b)=>a-b);
    if (win.length) out[i] = win[Math.floor(win.length*q)];
  }
  return out;
}

function _percentileRank(arr, w) {
  const out = new Array(arr.length).fill(NaN);
  const minPer = Math.max(20, Math.floor(w/10));
  for (let i = 0; i < arr.length; i++) {
    const start = Math.max(0, i-w+1);
    const win = arr.slice(start, i+1).filter(isFinite);
    if (win.length < minPer) continue;
    const cur = arr[i];
    out[i] = win.filter(v=>v<=cur).length / win.length;
  }
  return out;
}

function applyPhaseHysteresis(raw, confirmBars) {
  // confirmBars — число или массив (адаптивный порог на каждый бар)
  const n = raw.length;
  const isArr = Array.isArray(confirmBars);
  const out = new Array(n).fill(false);
  let state = false, trueRun = 0, falseRun = 0;
  for (let i = 0; i < n; i++) {
    const cb = Math.max(1, isArr ? (confirmBars[i] || 1) : confirmBars);
    if (raw[i]) { trueRun++; falseRun = 0; }
    else { falseRun++; trueRun = 0; }
    if (!state && trueRun >= cb) state = true;
    else if (state && falseRun >= cb) state = false;
    out[i] = state;
  }
  return out;
}

// ATR-прокси: rolling high-low за window баров
function computeAtrProxy(close, window) {
  const n = close.length;
  const out = new Array(n).fill(NaN);
  for (let i = window-1; i < n; i++) {
    let hi = -Infinity, lo = Infinity;
    for (let j = i-window+1; j <= i; j++) { if(close[j]>hi) hi=close[j]; if(close[j]<lo) lo=close[j]; }
    out[i] = hi - lo;
  }
  return out;
}

// Длительности сырых фаз: [{startPos, duration}]
function extractRawPhaseDurations(rawFlag) {
  const phases = [];
  let inPhase = false, start = 0, dur = 0;
  for (let i = 0; i < rawFlag.length; i++) {
    if (rawFlag[i] && !inPhase) { inPhase = true; start = i; dur = 1; }
    else if (rawFlag[i] && inPhase) { dur++; }
    else if (!rawFlag[i] && inPhase) { phases.push({ startPos: start, duration: dur }); inPhase = false; }
  }
  if (inPhase) phases.push({ startPos: start, duration: dur });
  return phases;
}

// Калибровка confirm_bars по корзинам волатильности ATR
// Возвращает {bucketEdges, bucketConfirm} или null
function calibrateConfirmBarsByVolatility(rawFlag, atrPctl, cfg) {
  const phases = extractRawPhaseDurations(rawFlag);
  if (!phases.length) return null;

  const valid = phases.filter(p => p.startPos < atrPctl.length && isFinite(atrPctl[p.startPos]));
  if (!valid.length) return null;

  const edges = Array.from({length: cfg.n_volatility_buckets+1}, (_,i) => i/cfg.n_volatility_buckets);
  const buckets = Array.from({length: cfg.n_volatility_buckets}, () => []);

  for (const p of valid) {
    const pctl = atrPctl[p.startPos];
    const b = Math.min(cfg.n_volatility_buckets-1, Math.floor(pctl * cfg.n_volatility_buckets));
    buckets[b].push(p.duration);
  }

  const bucketConfirm = {};
  for (let b = 0; b < cfg.n_volatility_buckets; b++) {
    const durs = buckets[b].sort((a,b)=>a-b);
    if (durs.length >= cfg.min_phase_samples_per_bucket) {
      const q = durs[Math.floor(durs.length * cfg.adaptive_confirm_quantile)];
      bucketConfirm[b] = Math.max(cfg.adaptive_confirm_floor, Math.ceil(q));
    } else {
      bucketConfirm[b] = cfg.phase_confirm_bars;
    }
  }
  return { edges, bucketConfirm };
}

// Переводит персентиль ATR в массив confirm_bars
function mapConfirmBars(atrPctl, calibration, cfg) {
  const { bucketConfirm } = calibration;
  return atrPctl.map(v => {
    if (!isFinite(v)) return cfg.phase_confirm_bars;
    const b = Math.min(cfg.n_volatility_buckets-1, Math.floor(v * cfg.n_volatility_buckets));
    return bucketConfirm[b] ?? cfg.phase_confirm_bars;
  });
}

function computeIndicator(rows, cfg, refSwitchDates) {
  const n = rows.length;
  const close = rows.map(r=>r.close);
  const physL = rows.map(r=>r.phys_long_contracts);
  const physS = rows.map(r=>r.phys_short_contracts);
  const physLp = rows.map(r=>r.phys_long_persons);
  const physSp = rows.map(r=>r.phys_short_persons);
  const legalL = rows.map(r=>r.legal_long_contracts);
  const legalS = rows.map(r=>r.legal_short_contracts);
  const legalLp = rows.map(r=>r.legal_long_persons);
  const legalSp = rows.map(r=>r.legal_short_persons);
  const hasLegal = legalL.some(v=>v>0);

  // TotalOI
  const totalOI = new Array(n);
  const totalPersons = new Array(n);
  for (let i=0; i<n; i++) {
    if (hasLegal) {
      totalOI[i] = ((physL[i]+legalL[i]) + (physS[i]+legalS[i]))/2;
      totalPersons[i] = physLp[i]+physSp[i]+legalLp[i]+legalSp[i];
    } else {
      totalOI[i] = physL[i]+physS[i];
      totalPersons[i] = physLp[i]+physSp[i];
    }
  }

  // NetPhysPct
  const netPhysPct = new Array(n);
  for (let i=0; i<n; i++) {
    netPhysPct[i] = totalOI[i] > 0 ? (physL[i]-physS[i])/totalOI[i] : NaN;
  }

  // Z-score
  const rollMean = _rollingMean(netPhysPct, cfg.z_window);
  const rollStd = _rollingStd(netPhysPct, cfg.z_window);
  const imbalanceZ = netPhysPct.map((v,i)=> rollStd[i]>0 ? (v-rollMean[i])/rollStd[i] : NaN);

  // Force
  const delta = new Array(n).fill(NaN);
  for (let i=1; i<n; i++) delta[i] = netPhysPct[i]-netPhysPct[i-1];
  const dw = cfg.decay_window;
  const wts = new Array(dw);
  let wSum = 0;
  for (let j=0; j<dw; j++) { wts[j]=Math.pow(cfg.decay, dw-1-j); wSum+=wts[j]; }
  for (let j=0; j<dw; j++) wts[j]/=wSum;
  const force = new Array(n).fill(NaN);
  for (let i=dw-1; i<n; i++) {
    let s=0, valid=true;
    for (let j=0; j<dw; j++) { const v=delta[i-dw+1+j]; if(!isFinite(v)){valid=false;break;} s+=v*wts[j]; }
    if (valid) force[i]=s;
  }

  // Velocity
  const vw = cfg.velocity_window;
  const velocity = new Array(n).fill(NaN);
  for (let i=vw; i<n; i++) if (close[i-vw]>0) velocity[i]=(close[i]-close[i-vw])/close[i-vw];
  const absVel = velocity.map(v=>isFinite(v)?Math.abs(v):NaN);
  const absVelDiff = new Array(n).fill(NaN);
  for (let i=1; i<n; i++) if(isFinite(absVel[i])&&isFinite(absVel[i-1])) absVelDiff[i]=-(absVel[i]-absVel[i-1]);
  const rawDecel = _rollingMean(absVelDiff, vw);
  const decelStd = _rollingStd(rawDecel, cfg.z_window);
  const velocityDecel = rawDecel.map((v,i)=> decelStd[i]>0 ? Math.tanh(v/decelStd[i]) : 0);

  // Conviction
  const avgSizeLong = physL.map((v,i)=> physLp[i]>=cfg.min_persons_floor ? v/physLp[i] : NaN);
  const avgSizeShort = physS.map((v,i)=> physSp[i]>=cfg.min_persons_floor ? v/physSp[i] : NaN);
  const domAvgSize = netPhysPct.map((v,i)=>v>0 ? avgSizeLong[i] : avgSizeShort[i]);
  const domDelta = new Array(n).fill(NaN);
  for (let i=1; i<n; i++) if(isFinite(domAvgSize[i])&&isFinite(domAvgSize[i-1])) domDelta[i]=domAvgSize[i]-domAvgSize[i-1];
  const domDeltaStd = _rollingStd(domDelta, cfg.conviction_window);
  const conviction = domDelta.map((v,i)=> domDeltaStd[i]>0 ? v/domDeltaStd[i] : NaN);

  // LiquidityConfidence
  const liquidityConf = _percentileRank(totalPersons, cfg.liquidity_window);

  // Base signal
  const refSwitchSet = new Set(refSwitchDates);
  const weightedImbalance = new Array(n).fill(NaN);
  for (let i=0; i<n; i++) {
    if (!isFinite(imbalanceZ[i])) continue;
    const conv = isFinite(conviction[i]) ? conviction[i] : 0;
    const lc = isFinite(liquidityConf[i]) ? liquidityConf[i] : 0;
    const vd = rows[i].ref_switch || refSwitchSet.has(rows[i].date) ? 0 : (isFinite(velocityDecel[i]) ? velocityDecel[i] : 0);
    weightedImbalance[i] = imbalanceZ[i] * (1 + cfg.conviction_alpha*conv) * lc * (1 + cfg.velocity_decel_gamma*vd);
  }

  // Accumulation flag
  // Используем per-bar H-L диапазон, нормированный на close (% candle range).
  // Это позволяет обнаружить «тихий бар» (флэт) даже за один день/час,
  // независимо от истории тренда и уровня цены.
  // Если H/L недоступны (нет свечей) — fallback: rolling % range close-to-close.
  const hasHL = rows.some(r => r.high > 0 && r.low > 0);
  const priceRange = new Array(n).fill(NaN);
  if (hasHL) {
    for (let i=0; i<n; i++) {
      const h = rows[i].high, l = rows[i].low, c = close[i];
      if (h > 0 && l > 0 && c > 0) priceRange[i] = (h - l) / c;
    }
  } else {
    for (let i=cfg.range_window-1; i<n; i++) {
      const win = close.slice(i-cfg.range_window+1, i+1);
      const avg = win.reduce((a,b)=>a+b,0)/win.length;
      if (avg > 0) priceRange[i] = (Math.max(...win) - Math.min(...win)) / avg;
    }
  }
  const rangeThresh = _rollingQuantile(priceRange, cfg.range_window, cfg.range_percentile);
  const narrowRange = priceRange.map((v,i)=> isFinite(v)&&isFinite(rangeThresh[i]) ? v<=rangeThresh[i] : false);
  // Условие имбаланса: Z-score > 0.3 если история достаточна,
  // иначе fallback на |netPhysPct| > 15% (работает с первого бара).
  const absZ = imbalanceZ.map(v=>isFinite(v)?Math.abs(v):NaN);
  const imbalanceSignificant = absZ.map((v,i)=>
    isFinite(v) ? v > 0.3 : Math.abs(netPhysPct[i]) > 0.15
  );
  const rawFlag = narrowRange.map((v,i)=>v&&imbalanceSignificant[i]);

  let accumFlag;
  if (cfg.use_adaptive_confirm) {
    const atr = computeAtrProxy(close, cfg.atr_window);
    const atrPctl = _percentileRank(atr, cfg.atr_percentile_window);
    const calibration = calibrateConfirmBarsByVolatility(rawFlag, atrPctl, cfg);
    if (calibration) {
      const confirmArr = mapConfirmBars(atrPctl, calibration, cfg);
      accumFlag = applyPhaseHysteresis(rawFlag, confirmArr);
    } else {
      accumFlag = applyPhaseHysteresis(rawFlag, cfg.phase_confirm_bars);
    }
  } else {
    accumFlag = applyPhaseHysteresis(rawFlag, cfg.phase_confirm_bars);
  }

  // Phase price range
  const phaseHigh = new Array(n).fill(NaN);
  const phaseLow = new Array(n).fill(NaN);
  let runH = NaN, runL = NaN, curId = -1;
  let phaseId = 0;
  const phaseIds = new Array(n).fill(0);
  for (let i=0; i<n; i++) {
    const prevFlag = i>0 ? accumFlag[i-1] : false;
    if (accumFlag[i] && !prevFlag) phaseId++;
    phaseIds[i] = phaseId;
    if (phaseIds[i] !== curId) { curId=phaseIds[i]; runH=NaN; runL=NaN; }
    if (accumFlag[i]) {
      const c = close[i];
      runH = isNaN(runH) ? c : Math.max(runH, c);
      runL = isNaN(runL) ? c : Math.min(runL, c);
    }
    phaseHigh[i] = runH;
    phaseLow[i] = runL;
  }

  // Intraday extremes (for daily bars: yesterday's high/low)
  const yesterdayHigh = new Array(n).fill(NaN);
  const yesterdayLow = new Array(n).fill(NaN);
  // For daily bars "yesterday" is simply previous bar
  for (let i=1; i<n; i++) {
    yesterdayHigh[i] = close[i-1];
    yesterdayLow[i] = close[i-1];
  }

  // Stress distance
  const stressDist = new Array(n).fill(0);
  for (let i=0; i<n; i++) {
    const c = close[i];
    let refL = phaseLow[i], refH = phaseHigh[i];
    if (cfg.include_yesterday_extreme) {
      refL = isNaN(refL) ? yesterdayLow[i] : Math.min(refL, yesterdayLow[i]||refL);
      refH = isNaN(refH) ? yesterdayHigh[i] : Math.max(refH, yesterdayHigh[i]||refH);
    }
    const domLong = netPhysPct[i] > 0;
    if (domLong && isFinite(refL) && refL > 0 && c < refL) {
      stressDist[i] = (refL - c) / refL;
    } else if (!domLong && isFinite(refH) && refH > 0 && c > refH) {
      stressDist[i] = (c - refH) / refH;
    }
  }

  // Release factor
  const releaseFactor = stressDist.map(v=> Math.pow(Math.max(v/cfg.stress_scale,0), cfg.stress_power));

  // Phase anchor
  const phaseAnchor = new Array(n).fill(NaN);
  let lastAnchor = NaN;
  for (let i=0; i<n; i++) {
    const prevFlag = i>0 ? accumFlag[i-1] : false;
    const isStart = accumFlag[i] && !prevFlag;
    if (isStart) lastAnchor = netPhysPct[i];
    if (accumFlag[i]) phaseAnchor[i] = lastAnchor;
    else phaseAnchor[i] = lastAnchor; // ffill
  }

  // Phase potential
  const phasePotential = phaseAnchor.map((a,i)=>
    isFinite(a) ? a*(1+cfg.phase_release_gamma*releaseFactor[i]) : NaN
  );

  return rows.map((r,i)=>({
    date: r.date,
    close: close[i],
    net_phys_pct: netPhysPct[i],
    total_oi: totalOI[i],
    total_persons: totalPersons[i],
    imbalance_z: imbalanceZ[i],
    force: force[i],
    conviction: conviction[i],
    liquidity_conf: liquidityConf[i],
    velocity_decel: velocityDecel[i],
    weighted_imbalance: weightedImbalance[i],
    accum_flag: accumFlag[i],
    phase_high: phaseHigh[i],
    phase_low: phaseLow[i],
    stress_dist: stressDist[i],
    release_factor: releaseFactor[i],
    phase_anchor: phaseAnchor[i],
    phase_potential: phasePotential[i],
  }));
}

// ========== RENDER ==========
function renderAll(result) {
  renderMetrics(result);
  renderInterp(result);
  drawPrice(result);
  drawOI(result);
  drawPhase(result);
  renderTable(result);
}

function fmt(v, dec=3) {
  if (!isFinite(v)) return '—';
  return v.toFixed(dec);
}

function renderMetrics(result) {
  const last = result.filter(r=>isFinite(r.weighted_imbalance)).at(-1);
  if (!last) return;
  const cards = [
    { lbl:'WeightedImbalance', val: fmt(last.weighted_imbalance,3), sub:'осн. сигнал', color: last.weighted_imbalance>0?'#f38ba8':'#a6e3a1' },
    { lbl:'NetPhysPct', val: fmt(last.net_phys_pct*100,1)+'%', sub:'перекос физ.лиц', color: '#cdd6f4' },
    { lbl:'ImbalanceZ', val: fmt(last.imbalance_z,2), sub:'z-score', color: '#cdd6f4' },
    { lbl:'LiquidityConf', val: fmt(last.liquidity_conf,2), sub:'уверенность', color: last.liquidity_conf<0.3?'#f38ba8':'#a6e3a1' },
    { lbl:'PhasePotential', val: fmt(last.phase_potential,3), sub:'фаз. потенциал', color: '#cba6f7' },
    { lbl:'StressDist', val: fmt(last.stress_dist*100,2)+'%', sub:'дистанция стресса', color: last.stress_dist>0.01?'#f38ba8':'#6c7086' },
    { lbl:'ReleaseFactor', val: fmt(last.release_factor,3), sub:'release', color: '#fab387' },
    { lbl:'Накопление', val: last.accum_flag?'ДА':'нет', sub:'фаза флэта', color: last.accum_flag?'#89dceb':'#6c7086' },
    { lbl:'TotalOI', val: Math.round(last.total_oi).toLocaleString(), sub:'контрактов', color: '#cdd6f4' },
  ];
  const row = document.getElementById('metrics-row');
  row.innerHTML = cards.map(c=>`
    <div class="card">
      <div class="lbl">${c.lbl}</div>
      <div class="val" style="color:${c.color}">${c.val}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join('');
}

function renderInterp(result) {
  const last = result.filter(r=>isFinite(r.weighted_imbalance)).at(-1);
  if (!last) return;
  const el = document.getElementById('interp');
  el.style.display = '';
  const wi = last.weighted_imbalance;
  const npp = last.net_phys_pct;
  const lc = last.liquidity_conf;
  const sd = last.stress_dist;
  const pp = last.phase_potential;

  let txt = '';
  if (lc < 0.2) txt += '⚠️ Низкая ликвидность (мало участников) — сигнал ненадёжен.<br>';

  const absMag = Math.abs(wi);
  let mag = absMag < 0.3 ? 'слабый' : absMag < 0.8 ? 'умеренный' : 'сильный';

  if (npp > 0) {
    txt += `📊 Физ.лица нетто-<b>ЛОНГ</b> (${fmt(npp*100,1)}% от TotalOI). `;
    txt += `Контрарный сигнал: возможен потенциал движения <b>ВНИЗ</b> (${mag}).`;
    if (sd > 0.005) txt += `<br>🔴 Стресс-дистанция ${fmt(sd*100,2)}% — цена ниже референсного лоя → риск каскадных стопов лонгистов.`;
  } else if (npp < 0) {
    txt += `📊 Физ.лица нетто-<b>ШОРТ</b> (${fmt(npp*100,1)}% от TotalOI). `;
    txt += `Контрарный сигнал: возможен потенциал движения <b>ВВЕРХ</b> (${mag}).`;
    if (sd > 0.005) txt += `<br>🟢 Стресс-дистанция ${fmt(sd*100,2)}% — цена выше референсного хая → риск каскадного закрытия шортов.`;
  } else {
    txt += 'Дисбаланс близок к нулю.';
  }
  if (last.accum_flag) {
    txt += `<br>🔵 Фаза накопления (флэт) активна. PhasePotential=${fmt(pp,3)} (ReleaseFactor=${fmt(last.release_factor,3)}).`;
  }
  el.innerHTML = txt;
}

// ========== CANVAS HELPERS ==========
function _setupCanvas(id) {
  const c = document.getElementById(id);
  const W = c.parentElement.clientWidth || 800;
  c.width = W * devicePixelRatio;
  c.height = c.offsetHeight * devicePixelRatio;
  const ctx = c.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);
  return { ctx, W, H: c.offsetHeight };
}

function _mapY(val, vmin, vmax, H, pad=10) {
  if (vmax === vmin) return H/2;
  return pad + (1-(val-vmin)/(vmax-vmin))*(H-2*pad);
}

function drawPrice(result) {
  const { ctx, W, H } = _setupCanvas('c-price');
  ctx.clearRect(0,0,W,H);
  const valid = result.filter(r=>isFinite(r.close));
  if (!valid.length) return;
  const closes = valid.map(r=>r.close);
  const vmin = Math.min(...closes), vmax = Math.max(...closes);
  const n = valid.length;
  const xStep = W/n;

  // Накопление фон
  ctx.fillStyle = 'rgba(137,220,235,0.08)';
  for (let i=0; i<n; i++) {
    if (valid[i].accum_flag) {
      ctx.fillRect(i*xStep, 0, xStep, H);
    }
  }

  // PhaseHigh / PhaseLow
  ctx.strokeStyle = 'rgba(137,220,235,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  for (const key of ['phase_high','phase_low']) {
    ctx.beginPath();
    let started = false;
    for (let i=0; i<n; i++) {
      const v = valid[i][key];
      if (!isFinite(v)) { started=false; continue; }
      const x = (i+0.5)*xStep, y=_mapY(v,vmin,vmax,H);
      if (!started) { ctx.moveTo(x,y); started=true; } else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Price line
  ctx.strokeStyle = '#89b4fa';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i=0; i<n; i++) {
    const x=(i+0.5)*xStep, y=_mapY(closes[i],vmin,vmax,H);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Ref switches
  ctx.strokeStyle='rgba(250,179,135,0.7)';
  ctx.lineWidth=1;
  for (let i=0; i<n; i++) {
    if (valid[i].ref_switch) {
      const x=(i+0.5)*xStep;
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
  }

  // Labels
  ctx.fillStyle='#6c7086'; ctx.font='10px sans-serif';
  const step = Math.max(1,Math.floor(n/8));
  for (let i=0; i<n; i+=step) {
    ctx.fillText(valid[i].date?.slice(5)||'', (i+0.5)*xStep-12, H-2);
  }
}

function drawOI(result) {
  const { ctx, W, H } = _setupCanvas('c-oi');
  ctx.clearRect(0,0,W,H);
  const valid = result.filter(r=>isFinite(r.weighted_imbalance));
  if (!valid.length) return;
  const n = valid.length;
  const xStep = W/n;

  const wiVals = valid.map(r=>r.weighted_imbalance);
  const ppVals = valid.map(r=>r.phase_potential).filter(isFinite);
  const vAll = [...wiVals, ...ppVals];
  const vmin = Math.min(...vAll), vmax = Math.max(...vAll);
  const zero = _mapY(0, vmin, vmax, H);

  // Zero line
  ctx.strokeStyle='#363a4f'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,zero); ctx.lineTo(W,zero); ctx.stroke();

  // WeightedImbalance histogram
  for (let i=0; i<n; i++) {
    const wi = valid[i].weighted_imbalance;
    const x = i*xStep, y = _mapY(wi, vmin, vmax, H);
    const col = wi > 0 ? 'rgba(243,139,168,0.6)' : 'rgba(166,227,161,0.6)';
    ctx.fillStyle = col;
    if (wi > 0) ctx.fillRect(x, y, xStep-1, zero-y);
    else ctx.fillRect(x, zero, xStep-1, y-zero);
  }

  // WI line
  ctx.strokeStyle='#b4befe'; ctx.lineWidth=1.5;
  ctx.beginPath();
  for (let i=0; i<n; i++) {
    const x=(i+0.5)*xStep, y=_mapY(valid[i].weighted_imbalance,vmin,vmax,H);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  // PhasePotential line
  ctx.strokeStyle='#cba6f7'; ctx.lineWidth=2; ctx.setLineDash([5,3]);
  ctx.beginPath(); let started=false;
  for (let i=0; i<n; i++) {
    const v=valid[i].phase_potential;
    if (!isFinite(v)){started=false;continue;}
    const x=(i+0.5)*xStep,y=_mapY(v,vmin,vmax,H);
    if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
  }
  ctx.stroke(); ctx.setLineDash([]);

  // Legend
  ctx.font='10px sans-serif';
  ctx.fillStyle='#b4befe'; ctx.fillText('WeightedImbalance',6,12);
  ctx.fillStyle='#cba6f7'; ctx.fillText('PhasePotential',6,24);
}

function drawPhase(result) {
  const { ctx, W, H } = _setupCanvas('c-phase');
  ctx.clearRect(0,0,W,H);
  const valid = result.filter(r=>isFinite(r.stress_dist));
  if (!valid.length) return;
  const n = valid.length;
  const xStep = W/n;

  const sdVals = valid.map(r=>r.stress_dist);
  const rfVals = valid.map(r=>Math.min(r.release_factor,5)); // cap для отображения
  const vmax = Math.max(...sdVals, ...rfVals, 0.001);

  // StressDist filled
  ctx.fillStyle='rgba(243,139,168,0.4)';
  for (let i=0; i<n; i++) {
    const v=sdVals[i];
    if(!v) continue;
    const x=i*xStep, h=(v/vmax)*(H-10);
    ctx.fillRect(x, H-h, xStep-1, h);
  }

  // ReleaseFactor line
  ctx.strokeStyle='#fab387'; ctx.lineWidth=2;
  ctx.beginPath();
  for (let i=0; i<n; i++) {
    const x=(i+0.5)*xStep, y=H-10-(rfVals[i]/vmax)*(H-10);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  ctx.font='10px sans-serif';
  ctx.fillStyle='#f38ba8'; ctx.fillText('StressDist',6,12);
  ctx.fillStyle='#fab387'; ctx.fillText('ReleaseFactor',6,24);
}

// ========== TABLE ==========
const TABLE_COLS = [
  { key:'date', lbl:'Дата' },
  { key:'close', lbl:'Цена', dec:2 },
  { key:'net_phys_pct', lbl:'NetPhysPct%', dec:2, pct:100 },
  { key:'imbalance_z', lbl:'ImbalZ', dec:3 },
  { key:'conviction', lbl:'Conv', dec:3 },
  { key:'liquidity_conf', lbl:'LiqConf', dec:2 },
  { key:'weighted_imbalance', lbl:'WI', dec:3 },
  { key:'accum_flag', lbl:'Accum' },
  { key:'stress_dist', lbl:'Stress%', dec:3, pct:100 },
  { key:'release_factor', lbl:'RelFact', dec:3 },
  { key:'phase_anchor', lbl:'Anchor', dec:3 },
  { key:'phase_potential', lbl:'PhasePot', dec:3 },
];

function renderTable(result) {
  const tbl = document.getElementById('tbl');
  tbl.querySelector('thead tr').innerHTML = TABLE_COLS.map(c=>`<th>${c.lbl}</th>`).join('');
  const tbody = tbl.querySelector('tbody');
  const rows = result.slice().reverse().slice(0,200);
  tbody.innerHTML = rows.map(r=>{
    return '<tr>' + TABLE_COLS.map(c=>{
      let v = r[c.key];
      let cls = '';
      if (typeof v === 'boolean') return `<td>${v?'✓':''}</td>`;
      if (typeof v === 'string') return `<td>${v}</td>`;
      if (!isFinite(v)) return `<td style="color:#313244">—</td>`;
      if (c.pct) v *= c.pct;
      const fv = c.dec != null ? v.toFixed(c.dec) : v;
      if (['imbalance_z','weighted_imbalance','net_phys_pct','phase_potential','phase_anchor'].includes(c.key)) {
        cls = v>0.05?'pos':v<-0.05?'neg':'neu';
      }
      return `<td class="${cls}">${fv}</td>`;
    }).join('') + '</tr>';
  }).join('');
}

// ========== CSV ==========
function labExportCsv() {
  if (!_lastResult) return;
  const header = TABLE_COLS.map(c=>c.lbl).join(',');
  const rows = _lastResult.map(r=>TABLE_COLS.map(c=>{
    const v = r[c.key];
    if (typeof v === 'boolean') return v?1:0;
    if (!isFinite(v)) return '';
    return c.pct ? (v*c.pct).toFixed(4) : (c.dec!=null?v.toFixed(c.dec):v);
  }).join(',')).join('\n');
  const blob = new Blob([header+'\n'+rows], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'oi_lab_export.csv';
  a.click();
}

// Перерисовка при ресайзе
window.addEventListener('resize', ()=>{ if (_lastResult) renderAll(_lastResult); });
