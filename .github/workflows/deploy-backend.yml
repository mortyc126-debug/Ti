name: Deploy Backend Worker

# Деплой Cloudflare Worker (backend/) через wrangler.
# Используем Global API Key (CF_EMAIL + CF_API_KEY) — самый надёжный
# способ авторизации wrangler в CI. Bearer-токены через secrets.BEZDNA
# у нас исторически не приживались (CF возвращал 401 даже на правильно
# скоупленных токенах).
#
# Нужны repository secrets:
#   - CF_EMAIL              — email аккаунта Cloudflare
#   - CF_API_KEY            — Global API Key (My Profile → API Tokens → View)
#   - CLOUDFLARE_ACCOUNT_ID — Account ID (32-символьный hex)
#   - ADMIN_TOKEN           — секрет для /collect/* endpoints (опционально)

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      set-admin-token:
        description: "Обновить ADMIN_TOKEN из GitHub Secrets (true/false)"
        required: false
        default: "false"

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify Global API Key
        env:
          CF_EMAIL:   ${{ secrets.CF_EMAIL }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: |
          set -e
          if [ -z "$CF_EMAIL" ] || [ -z "$CF_API_KEY" ]; then
            echo "::error::Не заданы CF_EMAIL или CF_API_KEY в repo secrets."
            exit 1
          fi
          # /user — самый простой эндпоинт для проверки Global API Key.
          HTTP=$(curl --max-time 15 -s -o /tmp/u.json -w "%{http_code}" \
            -H "X-Auth-Email: $CF_EMAIL" \
            -H "X-Auth-Key: $CF_API_KEY" \
            https://api.cloudflare.com/client/v4/user || echo "000")
          echo "verify HTTP=$HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::error::Cloudflare не признаёт Global API Key (HTTP $HTTP)."
            head -c 800 /tmp/u.json || true
            exit 1
          fi
          # покажем какой email распознан — на случай если в секрете опечатка
          node -e "let d=JSON.parse(require('fs').readFileSync('/tmp/u.json','utf8')); console.log('email:', d.result?.email, 'id:', d.result?.id?.slice(0,8)+'...')"

      - name: Deploy Worker
        working-directory: backend
        env:
          CLOUDFLARE_API_KEY:    ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_EMAIL:      ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest deploy

      - name: Set ADMIN_TOKEN secret (on demand)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['set-admin-token'] == 'true' }}
        working-directory: backend
        env:
          CLOUDFLARE_API_KEY:    ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_EMAIL:      ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_TOKEN:           ${{ secrets.ADMIN_TOKEN }}
        run: |
          printf '%s' "$ADMIN_TOKEN" | npx --yes wrangler@latest secret put ADMIN_TOKEN
