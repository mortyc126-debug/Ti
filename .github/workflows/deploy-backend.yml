name: Deploy Backend Worker

# Деплой Cloudflare Worker (backend/) через wrangler.
# Нужны repository secrets:
#   - mist                  — Cloudflare API Token (шаблон "Edit Cloudflare Workers")
#   - CLOUDFLARE_ACCOUNT_ID — Account ID (32-символьный hex, sidebar в dash.cloudflare.com)
#   - ADMIN_TOKEN           — секрет для /collect/* endpoints (опционально)

on:
  push:
    branches:
      - claude/determined-brahmagupta-XsEm4
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      set-admin-token:
        description: "Обновить ADMIN_TOKEN из GitHub Secrets (true/false)"
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Чистим токен от случайных пробелов/переносов и кладём в env
      # для следующих шагов. Заодно проверяем что secret вообще задан
      # и сверяем «начало/конец» — чтобы было видно, бьётся ли значение
      # с тем, что показывает Cloudflare на экране создания.
      - name: Sanitize and verify token
        env:
          RAW_TOKEN: ${{ secrets.mist }}
        run: |
          if [ -z "$RAW_TOKEN" ]; then
            echo "::error::Secret 'mist' is empty or not set."
            exit 1
          fi
          # 1. Чистим CR/LF/TAB/обычные пробелы по всей строке.
          CLEAN_TOKEN="$(printf '%s' "$RAW_TOKEN" | tr -d '\r\n\t ')"

          # 2. Дополнительно убираем «невидимые» Unicode-символы:
          #    BOM (U+FEFF), zero-width space (U+200B), zero-width joiner (U+200D),
          #    NBSP (U+00A0). Часто прицепляется при копировании на мобильных.
          CLEAN_TOKEN="$(printf '%s' "$CLEAN_TOKEN" \
            | python3 -c "import sys; s=sys.stdin.read(); print(''.join(c for c in s if c not in '﻿​‌‍ ‬ '), end='')")"

          LEN=${#CLEAN_TOKEN}
          echo "TOKEN_LEN=$LEN"

          # 3. Показываем первые 6 и последние 6 символов токена — этого хватит
          #    чтобы сверить с экраном Cloudflare, и не достаточно чтобы кто-то
          #    использовал значение из публичных логов.
          if [ "$LEN" -ge 12 ]; then
            HEAD="${CLEAN_TOKEN:0:6}"
            TAIL="${CLEAN_TOKEN: -6}"
            echo "TOKEN_PREFIX=$HEAD..."
            echo "TOKEN_SUFFIX=...$TAIL"
          fi

          # 4. Проверяем символьный класс — должны быть только ASCII-печатные
          #    (a-z A-Z 0-9 _-.). Если попадётся что-то иное — выводим коды.
          NON_ASCII_COUNT=$(printf '%s' "$CLEAN_TOKEN" | LC_ALL=C grep -c '[^[:print:]]' || true)
          NON_TOKEN_COUNT=$(printf '%s' "$CLEAN_TOKEN" | LC_ALL=C tr -d 'a-zA-Z0-9_.-' | wc -c)
          echo "NON_ASCII_COUNT=$NON_ASCII_COUNT"
          echo "NON_TOKEN_CHARS_COUNT=$NON_TOKEN_COUNT"
          if [ "$NON_TOKEN_COUNT" -gt 0 ]; then
            echo "::warning::В токене есть символы вне набора [a-zA-Z0-9_.-]."
            echo "Hex-дамп подозрительных мест:"
            printf '%s' "$CLEAN_TOKEN" | LC_ALL=C tr -d 'a-zA-Z0-9_.-' | xxd
          fi

          # 5. Проверяем токен через /user/tokens/verify — даёт прямой ответ
          #    Cloudflare что не так.
          HTTP=$(curl -s -o /tmp/verify.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLEAN_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          echo "verify HTTP=$HTTP"
          cat /tmp/verify.json
          echo
          if [ "$HTTP" != "200" ]; then
            echo "::error::Cloudflare не признаёт токен (см. JSON и prefix/suffix выше)."
            echo "::error::Сверьте TOKEN_PREFIX/TOKEN_SUFFIX с экраном Cloudflare."
            exit 1
          fi

          # 6. Прокидываем валидный токен в env для следующих шагов.
          echo "::add-mask::$CLEAN_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CLEAN_TOKEN" >> "$GITHUB_ENV"

      - name: Deploy Worker
        working-directory: backend
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest deploy

      - name: Set ADMIN_TOKEN secret (on demand)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['set-admin-token'] == 'true' }}
        working-directory: backend
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          printf '%s' "$ADMIN_TOKEN" | npx --yes wrangler@latest secret put ADMIN_TOKEN
